<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2250" viewBox="0 0 1800 2250" role="img" aria-labelledby="title desc">
  <title id="title">Blueprint terminal poster</title>
  <desc id="desc">A Blueprint promotional poster showing the workflow, command surface, state contract, guardrails, and quick start.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061927"/>
      <stop offset="0.55" stop-color="#020b11"/>
      <stop offset="1" stop-color="#06141b"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="18%" cy="6%" r="60%">
      <stop offset="0" stop-color="#1677ff" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#1677ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#1677ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="80%" cy="87%" r="54%">
      <stop offset="0" stop-color="#68f0a2" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#68f0a2" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#68f0a2" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#63f1ff" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>
    <pattern id="micro" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 0 4 H 8" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <style>
      .mono { font-family: "Cascadia Mono", "SF Mono", "IBM Plex Mono", monospace; }
      .display { font-family: "Bahnschrift", "Arial Narrow", "Aptos Display", sans-serif; }
      .panel { fill: rgba(4, 24, 34, 0.86); stroke: rgba(126, 214, 255, 0.28); stroke-width: 2; }
      .panel-hot { fill: rgba(5, 33, 46, 0.9); stroke: rgba(99, 241, 255, 0.52); stroke-width: 2; }
      .small { font-size: 23px; fill: #8fb2c2; }
      .micro { font-size: 19px; fill: #6f93a3; }
      .body { font-size: 26px; fill: #d5eef5; }
      .body-dim { font-size: 24px; fill: #9db9c5; }
      .title { font-size: 31px; fill: #68f0a2; font-weight: 800; letter-spacing: 3px; }
      .cmd { fill: #63f1ff; font-weight: 800; }
      .green { fill: #68f0a2; }
      .cyan { fill: #63f1ff; }
      .amber { fill: #ffc857; }
      .rose { fill: #ff6b86; }
      .violet { fill: #a985ff; }
      .ink { fill: #e8fbff; }
      .muted { fill: #8fb2c2; }
      .rule { stroke: rgba(126, 214, 255, 0.18); stroke-width: 2; }
      .dash { stroke: rgba(104, 240, 162, 0.36); stroke-width: 2; stroke-dasharray: 10 12; }
    </style>
  </defs>

  <rect width="1800" height="2250" fill="#00090d"/>
  <rect width="1800" height="2250" fill="url(#bg)"/>
  <rect width="1800" height="2250" fill="url(#glowBlue)"/>
  <rect width="1800" height="2250" fill="url(#glowGreen)"/>
  <rect width="1800" height="2250" fill="url(#grid)" opacity="0.78"/>
  <rect width="1800" height="2250" fill="url(#micro)" opacity="0.5"/>

  <rect x="34" y="34" width="1732" height="2182" rx="34" fill="none" stroke="#63f1ff" stroke-opacity="0.34" stroke-width="2"/>
  <rect x="56" y="56" width="1688" height="2138" rx="26" fill="none" stroke="#63f1ff" stroke-opacity="0.16" stroke-width="2"/>

  <g class="mono">
    <circle cx="84" cy="86" r="7" fill="#68f0a2"/>
    <text x="106" y="94" font-size="24" fill="#68f0a2">rhishi@repo:~$ /blu --explain-the-system</text>
  </g>

  <g transform="translate(70 126)">
    <rect class="panel-hot" x="0" y="0" width="1055" height="390" rx="24"/>
    <rect x="0" y="0" width="1055" height="390" rx="24" fill="url(#grid)" opacity="0.35"/>
    <text class="mono cyan" x="34" y="55" font-size="24" letter-spacing="5">GEMINI-NATIVE WORKFLOW ENGINE</text>
    <text class="display" x="28" y="210" font-size="160" font-weight="900" letter-spacing="-14" fill="none" stroke="#e8fbff" stroke-width="3" opacity="0.98">blueprint</text>
    <text class="display" x="35" y="268" font-size="44" fill="#d5eef5" letter-spacing="-1.5">Turn agentic coding from a clever chat into an</text>
    <text class="display green" x="35" y="318" font-size="48" font-weight="800" letter-spacing="-1.5">artifact-backed delivery system.</text>

    <g class="mono" font-size="20">
      <rect x="34" y="338" width="150" height="32" rx="16" fill="#010d13" stroke="#63f1ff" stroke-opacity="0.28"/>
      <text x="51" y="361" fill="#d5eef5">/blu router</text>
      <rect x="198" y="338" width="264" height="32" rx="16" fill="#010d13" stroke="#63f1ff" stroke-opacity="0.28"/>
      <text x="216" y="361" fill="#d5eef5">53 implemented commands</text>
      <rect x="476" y="338" width="220" height="32" rx="16" fill="#010d13" stroke="#63f1ff" stroke-opacity="0.28"/>
      <text x="494" y="361" fill="#d5eef5">.blueprint/ memory</text>
      <rect x="710" y="338" width="206" height="32" rx="16" fill="#010d13" stroke="#63f1ff" stroke-opacity="0.28"/>
      <text x="728" y="361" fill="#d5eef5">MCP state engine</text>
    </g>
  </g>

  <g transform="translate(1145 126)">
    <rect class="panel" x="0" y="0" width="585" height="390" rx="24"/>
    <circle cx="480" cy="260" r="170" fill="none" stroke="#68f0a2" stroke-opacity="0.22" stroke-dasharray="12 14"/>
    <g transform="translate(32 35)">
      <path d="M28 0 H180 Q222 0 222 42 V178 Q222 218 182 218 H28 Q0 218 0 190 V28 Q0 0 28 0 Z" fill="#061b2a" stroke="#e8fbff" stroke-width="8"/>
      <path d="M42 62 L86 106 L42 150" fill="none" stroke="#e8fbff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M110 150 H150" stroke="#e8fbff" stroke-width="14" stroke-linecap="round"/>
      <path d="M222 84 H312 Q355 84 372 119 L392 160 Q410 197 452 197 H498" fill="none" stroke="#63f1ff" stroke-width="9" stroke-linecap="round"/>
      <path d="M222 164 H314 Q350 164 370 140 L409 91 Q432 64 468 64 H510" fill="none" stroke="#68f0a2" stroke-width="9" stroke-linecap="round"/>
      <circle cx="520" cy="64" r="28" fill="#031016" stroke="#68f0a2" stroke-width="8"/>
      <circle cx="520" cy="197" r="28" fill="#031016" stroke="#63f1ff" stroke-width="8"/>
    </g>
    <text class="display ink" x="32" y="280" font-size="34" font-weight="800">AI coding needs an operating model,</text>
    <text class="display amber" x="32" y="323" font-size="38" font-weight="900">not just better prompts.</text>
    <text class="mono muted" x="33" y="358" font-size="21">Plan. Execute. Validate. Review. Ship with evidence.</text>
  </g>

  <g transform="translate(70 548)">
    <rect class="panel" x="0" y="0" width="1660" height="286" rx="24"/>
    <text class="mono title" x="28" y="48">FROM IDEA TO INSPECTABLE DELIVERY</text>
    <text class="mono micro" x="790" y="48">THE FLIGHT RAIL</text>
    <g transform="translate(28 80)">
      <g>
        <rect class="panel-hot" x="0" y="0" width="255" height="170" rx="18"/>
        <text class="mono micro" x="207" y="32">01</text>
        <text class="mono ink" x="20" y="42" font-size="28" font-weight="800">Discover</text>
        <text class="mono body-dim" x="20" y="82">Capture intent,</text>
        <text class="mono body-dim" x="20" y="115">scope + risks.</text>
        <text class="mono cmd" x="20" y="150" font-size="21">/blu-discuss-phase</text>
      </g>
      <g transform="translate(268 0)">
        <rect class="panel-hot" x="0" y="0" width="255" height="170" rx="18"/>
        <text class="mono micro" x="207" y="32">02</text>
        <text class="mono ink" x="20" y="42" font-size="28" font-weight="800">Research</text>
        <text class="mono body-dim" x="20" y="82">Turn unknowns into</text>
        <text class="mono body-dim" x="20" y="115">bounded evidence.</text>
        <text class="mono cmd" x="20" y="150" font-size="21">/blu-research-phase</text>
      </g>
      <g transform="translate(536 0)">
        <rect class="panel-hot" x="0" y="0" width="255" height="170" rx="18"/>
        <text class="mono micro" x="207" y="32">03</text>
        <text class="mono ink" x="20" y="42" font-size="28" font-weight="800">Plan</text>
        <text class="mono body-dim" x="20" y="82">Create executable</text>
        <text class="mono body-dim" x="20" y="115">phase contracts.</text>
        <text class="mono cmd" x="20" y="150" font-size="21">/blu-plan-phase</text>
      </g>
      <g transform="translate(804 0)">
        <rect class="panel-hot" x="0" y="0" width="255" height="170" rx="18"/>
        <text class="mono micro" x="207" y="32">04</text>
        <text class="mono ink" x="20" y="42" font-size="28" font-weight="800">Execute</text>
        <text class="mono body-dim" x="20" y="82">Ship scoped slices</text>
        <text class="mono body-dim" x="20" y="115">with summaries.</text>
        <text class="mono cmd" x="20" y="150" font-size="21">/blu-execute-phase</text>
      </g>
      <g transform="translate(1072 0)">
        <rect class="panel-hot" x="0" y="0" width="255" height="170" rx="18"/>
        <text class="mono micro" x="207" y="32">05</text>
        <text class="mono ink" x="20" y="42" font-size="28" font-weight="800">Validate</text>
        <text class="mono body-dim" x="20" y="82">Replace vibes with</text>
        <text class="mono body-dim" x="20" y="115">verification evidence.</text>
        <text class="mono cmd" x="20" y="150" font-size="21">/blu-validate-phase</text>
      </g>
      <g transform="translate(1340 0)">
        <rect class="panel-hot" x="0" y="0" width="255" height="170" rx="18"/>
        <text class="mono micro" x="207" y="32">06</text>
        <text class="mono ink" x="20" y="42" font-size="28" font-weight="800">Ship</text>
        <text class="mono body-dim" x="20" y="82">Prepare release</text>
        <text class="mono body-dim" x="20" y="115">and handoff trails.</text>
        <text class="mono cmd" x="20" y="150" font-size="21">/blu-ship</text>
      </g>
    </g>
  </g>

  <g transform="translate(70 864)">
    <rect class="panel" x="0" y="0" width="1080" height="610" rx="24"/>
    <text class="mono title" x="28" y="50">COMMAND SURFACE</text>
    <text class="mono micro" x="450" y="50">53 IMPLEMENTED CATALOG ENTRIES</text>

    <g transform="translate(28 86)">
      <g>
        <rect class="panel-hot" x="0" y="0" width="326" height="152" rx="18"/>
        <rect x="20" y="20" width="54" height="54" rx="15" fill="#63f1ff"/>
        <text class="mono" x="35" y="57" font-size="25" fill="#031016" font-weight="900">7</text>
        <text class="mono ink" x="90" y="42" font-size="25" font-weight="800">Foundation</text>
        <text class="mono muted" x="90" y="76" font-size="20">load, route, map, inspect</text>
        <text class="mono cmd" x="20" y="122" font-size="19">/blu  /blu-help  /blu-progress</text>
      </g>
      <g transform="translate(356 0)">
        <rect class="panel-hot" x="0" y="0" width="326" height="152" rx="18"/>
        <rect x="20" y="20" width="54" height="54" rx="15" fill="#68f0a2"/>
        <text class="mono" x="30" y="57" font-size="25" fill="#031016" font-weight="900">10</text>
        <text class="mono ink" x="90" y="42" font-size="25" font-weight="800">Lifecycle</text>
        <text class="mono muted" x="90" y="76" font-size="20">discover through UAT</text>
        <text class="mono cmd" x="20" y="122" font-size="19">/blu-plan-phase</text>
      </g>
      <g transform="translate(712 0)">
        <rect class="panel-hot" x="0" y="0" width="326" height="152" rx="18"/>
        <rect x="20" y="20" width="54" height="54" rx="15" fill="#ffc857"/>
        <text class="mono" x="35" y="57" font-size="25" fill="#031016" font-weight="900">9</text>
        <text class="mono ink" x="90" y="42" font-size="25" font-weight="800">Roadmap</text>
        <text class="mono muted" x="90" y="76" font-size="20">move phases safely</text>
        <text class="mono cmd" x="20" y="122" font-size="19">/blu-add-phase</text>
      </g>
      <g transform="translate(0 178)">
        <rect class="panel-hot" x="0" y="0" width="326" height="152" rx="18"/>
        <rect x="20" y="20" width="54" height="54" rx="15" fill="#a985ff"/>
        <text class="mono" x="35" y="57" font-size="25" fill="#031016" font-weight="900">9</text>
        <text class="mono ink" x="90" y="42" font-size="25" font-weight="800">Capture</text>
        <text class="mono muted" x="90" y="76" font-size="20">notes, todos, debug</text>
        <text class="mono cmd" x="20" y="122" font-size="19">/blu-add-todo  /blu-debug</text>
      </g>
      <g transform="translate(356 178)">
        <rect class="panel-hot" x="0" y="0" width="326" height="152" rx="18"/>
        <rect x="20" y="20" width="54" height="54" rx="15" fill="#68f0a2"/>
        <text class="mono" x="29" y="57" font-size="25" fill="#031016" font-weight="900">12</text>
        <text class="mono ink" x="90" y="42" font-size="25" font-weight="800">Quality</text>
        <text class="mono muted" x="90" y="76" font-size="20">review, secure, ship</text>
        <text class="mono cmd" x="20" y="122" font-size="19">/blu-code-review</text>
      </g>
      <g transform="translate(712 178)">
        <rect class="panel-hot" x="0" y="0" width="326" height="152" rx="18"/>
        <rect x="20" y="20" width="54" height="54" rx="15" fill="#ff6b86"/>
        <text class="mono" x="35" y="57" font-size="25" fill="#031016" font-weight="900">6</text>
        <text class="mono ink" x="90" y="42" font-size="25" font-weight="800">Maintenance</text>
        <text class="mono muted" x="90" y="76" font-size="20">workspaces, cleanup</text>
        <text class="mono cmd" x="20" y="122" font-size="19">/blu-workstreams</text>
      </g>
    </g>

    <line class="rule" x1="28" x2="1052" y1="456" y2="456"/>
    <text class="mono body" x="30" y="506">Root router: <tspan class="cmd">/blu</tspan> finds the safest next command.</text>
    <text class="mono body" x="30" y="546">Direct commands: <tspan class="cmd">/blu-&lt;command&gt;</tspan> when you know the exact action.</text>
    <text class="mono body" x="30" y="586">Public guidance stays tied to <tspan class="green">implemented</tspan> runtime entries.</text>
  </g>

  <g transform="translate(1180 864)">
    <rect class="panel" x="0" y="0" width="550" height="610" rx="24"/>
    <text class="mono title" x="28" y="50">QUICK START</text>
    <text class="mono micro" x="310" y="50">GEMINI CLI</text>
    <rect x="28" y="86" width="494" height="200" rx="18" fill="rgba(255, 200, 87, 0.08)" stroke="rgba(255, 200, 87, 0.32)" stroke-width="2"/>
    <text class="mono amber" x="52" y="126" font-size="24">Install the extension.</text>
    <text class="mono ink" x="52" y="172" font-size="21">gemini extensions install \</text>
    <text class="mono cmd" x="52" y="207" font-size="21">https://github.com/rakole/blueprint</text>
    <text class="mono muted" x="52" y="253" font-size="21">restart Gemini CLI, then run:</text>

    <rect x="28" y="312" width="494" height="170" rx="18" fill="rgba(1, 10, 15, 0.74)" stroke="rgba(126, 214, 255, 0.18)" stroke-width="2"/>
    <text class="mono cmd" x="52" y="355" font-size="23">/blu-help</text>
    <text class="mono muted" x="350" y="355" font-size="21">confirm loaded</text>
    <text class="mono cmd" x="52" y="400" font-size="23">/blu-new-project</text>
    <text class="mono muted" x="350" y="400" font-size="21">start greenfield</text>
    <text class="mono cmd" x="52" y="445" font-size="23">/blu-map-codebase</text>
    <text class="mono muted" x="350" y="445" font-size="21">start brownfield</text>

    <text class="mono green" x="30" y="540" font-size="28">Stop there.</text>
    <text class="mono body-dim" x="30" y="580">Blueprint will tell you the next safe move.</text>
  </g>

  <g transform="translate(70 1504)">
    <rect class="panel" x="0" y="0" width="820" height="470" rx="24"/>
    <text class="mono title" x="28" y="50">STATE IS THE PRODUCT</text>
    <text class="mono micro" x="470" y="50">NOT HIDDEN CHAT MEMORY</text>
    <rect x="30" y="86" width="316" height="320" rx="22" fill="rgba(104, 240, 162, 0.08)" stroke="rgba(104, 240, 162, 0.33)" stroke-width="2"/>
    <text class="display green" x="58" y="200" font-size="78" font-weight="900" letter-spacing="-5">.blueprint/</text>
    <text class="mono body" x="58" y="258">Project-local evidence</text>
    <text class="mono body-dim" x="58" y="296">for roadmaps, state,</text>
    <text class="mono body-dim" x="58" y="334">phases, reports, todos,</text>
    <text class="mono body-dim" x="58" y="372">backlog, and workstreams.</text>

    <rect x="376" y="86" width="414" height="320" rx="18" fill="rgba(1, 10, 15, 0.72)" stroke="rgba(126, 214, 255, 0.18)" stroke-width="2"/>
    <text class="mono body" x="404" y="128">.blueprint/</text>
    <text class="mono body-dim" x="434" y="166">PROJECT.md</text>
    <text class="mono body-dim" x="434" y="204">REQUIREMENTS.md</text>
    <text class="mono body-dim" x="434" y="242">ROADMAP.md</text>
    <text class="mono body-dim" x="434" y="280">STATE.md</text>
    <text class="mono body-dim" x="434" y="318">phases/</text>
    <text class="mono body-dim" x="464" y="356">XX-PLAN.md</text>
    <text class="mono body-dim" x="464" y="394">XX-VERIFICATION.md</text>
  </g>

  <g transform="translate(920 1504)">
    <rect class="panel" x="0" y="0" width="810" height="470" rx="24"/>
    <text class="mono title" x="28" y="50">WHY IT FEELS DIFFERENT</text>
    <text class="mono micro" x="520" y="50">GOVERNED ACCELERATION</text>
    <line class="rule" x1="28" x2="782" y1="84" y2="84"/>

    <text class="mono cmd" x="30" y="132" font-size="25">thin commands</text>
    <text class="mono body-dim" x="260" y="132">User prompts stay focused; MCP tools own persistence.</text>
    <line class="rule" x1="28" x2="782" y1="160" y2="160"/>

    <text class="mono cmd" x="30" y="208" font-size="25">skill contracts</text>
    <text class="mono body-dim" x="260" y="208">Each workflow has reusable orchestration rules.</text>
    <line class="rule" x1="28" x2="782" y1="236" y2="236"/>

    <text class="mono cmd" x="30" y="284" font-size="25">bounded agents</text>
    <text class="mono body-dim" x="260" y="284">Deep work can happen without losing scope control.</text>
    <line class="rule" x1="28" x2="782" y1="312" y2="312"/>

    <text class="mono cmd" x="30" y="360" font-size="25">safe routing</text>
    <text class="mono body-dim" x="260" y="360">Routers recommend implemented capabilities only.</text>
    <line class="rule" x1="28" x2="782" y1="388" y2="388"/>

    <text class="mono cmd" x="30" y="436" font-size="25">auditable trail</text>
    <text class="mono body-dim" x="260" y="436">The useful residue is committed artifacts, not vibes.</text>
  </g>

  <g transform="translate(70 2004)">
    <rect class="panel" x="0" y="0" width="530" height="160" rx="24"/>
    <text class="mono green" x="30" y="48" font-size="28" font-weight="800">For leaders</text>
    <text class="mono body-dim" x="30" y="92">The control layer between "AI can write code"</text>
    <text class="mono body-dim" x="30" y="128">and "we can trust AI-assisted delivery."</text>
  </g>

  <g transform="translate(630 2004)">
    <rect class="panel" x="0" y="0" width="490" height="160" rx="24"/>
    <text class="mono green" x="30" y="48" font-size="28" font-weight="800">For builders</text>
    <text class="mono body-dim" x="30" y="92">Less lost context. Cleaner next actions.</text>
    <text class="mono body-dim" x="30" y="128">Reviewable evidence. Repeatable loops.</text>
  </g>

  <g transform="translate(1150 2004)">
    <rect class="panel-hot" x="0" y="0" width="580" height="160" rx="24"/>
    <circle cx="508" cy="34" r="10" fill="#ff6b86"/>
    <circle cx="535" cy="34" r="10" fill="#ffc857"/>
    <circle cx="562" cy="34" r="10" fill="#68f0a2"/>
    <text class="mono cmd" x="30" y="54" font-size="24">blueprint@repo:~$ /blu-next</text>
    <text class="mono green" x="30" y="96" font-size="23">[ state loaded     ]  ok</text>
    <text class="mono green" x="30" y="128" font-size="23">[ route checked    ]  implemented only</text>
  </g>
</svg>
