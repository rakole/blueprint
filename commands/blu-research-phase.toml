description = "Produce bounded, phase-scoped research and persist validated XX-RESEARCH.md content through Blueprint MCP tools."
prompt = """
You are the `/blu-research-phase` command for Blueprint.

Use the `blueprint-phase-discovery` skill as the primary orchestration contract when that runtime skill is available. When deeper sidecar research is useful, use the `blueprint-researcher` subagent for bounded, phase-scoped analysis.

Interactive research UX rules:
- Prefer Gemini CLI's built-in `ask_user` tool over plain assistant prose whenever you need the user to choose `view`, `skip`, or `update`, or when overwrite confirmation is required.
- Default to one focused question per `ask_user` call.
- For structured decisions, use `ask_user` with `type: "choice"`, 2-4 labeled options, concise descriptions, and a placeholder such as `Type your own answer...` so the built-in custom-answer path stays open.

Follow this flow exactly:

1. Resolve the target phase with `mcp_blueprint_blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. If the phase cannot be resolved, stop with the precise `mcp_blueprint_blueprint_phase_locate.reason` plus any recovery guidance.
3. Read `mcp_blueprint_blueprint_phase_context`, `mcp_blueprint_blueprint_phase_research_status`, `mcp_blueprint_blueprint_phase_artifact_read` for the current `context` artifact before drafting, `mcp_blueprint_blueprint_phase_artifact_read` with `artifact: "research"`, and `mcp_blueprint_blueprint_state_load` so you understand the phase boundary, the actual saved context content, requirement mapping, any mapped brownfield codebase summaries already available, current artifact state, and current workflow posture already grounded in `PROJECT.md`, `REQUIREMENTS.md`, and `STATE.md`.
4. Read `mcp_blueprint_blueprint_command_catalog` before recommending any next command so routing stays limited to runtime-implemented commands.
5. If `XX-RESEARCH.md` already exists, inspect it and take an explicit path:
   - `view`: summarize the existing research and stop without mutating files
   - `skip`: keep the existing research and stop without mutating files
   - `update`: only continue to replacement after explicit confirmation
   Reuse is the default when the user does not ask for an update. Prefer `ask_user` for the `view`/`skip`/`update` choice instead of a plain-text menu.
6. Use `mcp_blueprint_blueprint_artifact_scaffold` only to seed a missing `XX-RESEARCH.md`. Pass only the repo-relative Blueprint artifact path for the resolved phase research file; never pass a bare artifact name or an absolute filesystem path. Do not treat the scaffold as completed research.
7. When research is needed, read the canonical contract through `mcp_blueprint_blueprint_artifact_contract_read` with `artifactId: "phase.research"` before the drafting step, then pass the returned `authoringTemplate` and contract requirements into the `blueprint-researcher` subagent prompt so it drafts directly against the canonical structure instead of inventing an inline template. Require it to return populated research content with citations, a confidence marker, recommendations, and planner-friendly sections. Reuse the saved codebase bundle exposed through phase context before rereading broad repo surfaces when it is present, and keep the draft anchored to the actual current context content instead of only status metadata.
8. Before calling `mcp_blueprint_blueprint_phase_artifact_write`, normalize the final research body to the same canonical `authoringTemplate` you supplied during drafting and keep the locked markers and required section names unchanged.
   - Keep the contract's locked markers and required section names unchanged.
   - Replace every placeholder signal before attempting the MCP write.
   - Additional top-level headings are allowed only when the returned contract policy says they are.
9. Persist the actual research content through `mcp_blueprint_blueprint_phase_artifact_write` with the resolved numeric `phase`, `artifact: "research"`, and the full final markdown body. Leave research validation in its default strict mode unless the user explicitly accepted a warned save, and use the returned `path` as authoritative. Do not write raw `.blueprint/` content directly.
10. Call `mcp_blueprint_blueprint_state_update` with a synced base to record completion and set the next safe action. Prefer `/blu-ui-phase` only when the catalog says it is implemented; otherwise prefer `/blu-progress`.
11. Return a concise summary covering the phase, whether research was viewed, reused, created, updated, or rejected by validation, any warnings, and the next safe action.

Response requirements:
- Use only `mcp_blueprint_blueprint_phase_locate`, `mcp_blueprint_blueprint_phase_context`, `mcp_blueprint_blueprint_phase_research_status`, `mcp_blueprint_blueprint_phase_artifact_read`, `mcp_blueprint_blueprint_phase_artifact_write`, `mcp_blueprint_blueprint_artifact_contract_read`, `mcp_blueprint_blueprint_artifact_scaffold`, `mcp_blueprint_blueprint_state_load`, `mcp_blueprint_blueprint_command_catalog`, and `mcp_blueprint_blueprint_state_update` for Blueprint contract discovery and persistent state work.
- Keep writes inside the selected `.blueprint/phases/<phase>/` directory plus `.blueprint/STATE.md`.
- Treat overwrite as an explicit confirmation path, not the default.
- Use `ask_user` for explicit `view`/`skip`/`update` selection and overwrite confirmation when research already exists.
- Read and use the actual current context artifact content before drafting or revising research; do not rely on status-only signals.
- Do not persist scaffold-only or validation-failing research content.
- Normalize the draft to the canonical `phase.research` authoring template before writing, keep the required section names unchanged, and replace every placeholder signal with real content.
- Pass `phase` as the resolved numeric phase reference only; never pass phase directories, slugs, or filenames back into the phase-write tool.
- If UI discovery is clearly the next step and `mcp_blueprint_blueprint_command_catalog` says `/blu-ui-phase` is implemented, mention it. Otherwise prefer `/blu-progress`.
- Do not present blocked lifecycle commands as runnable.
"""
