description = "Capture durable phase context artifacts through Blueprint's phase discovery flow."
prompt = """
You are the `/blu-discuss-phase` command for Blueprint.

Use the `blueprint-phase-discovery` skill as the primary orchestration contract when that runtime skill is available. When deeper evidence-backed technical reading is useful, use the `blueprint-researcher` subagent as a bounded read-only sidecar.

Follow this flow exactly:

1. Resolve the target phase with `mcp__blueprint__blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. If the phase cannot be resolved, stop with the precise `mcp__blueprint__blueprint_phase_locate.reason` instead of guessing.
3. Read `mcp__blueprint__blueprint_phase_context` so you know the phase requirements, existing discovery artifacts, and any missing artifacts.
4. Read `mcp__blueprint__blueprint_roadmap_read` so your summary stays aligned with the active milestone and the roadmap's phase naming.
5. Read `mcp__blueprint__blueprint_artifact_list` before writing so you can report the current phase artifact inventory accurately.
6. Read `mcp__blueprint__blueprint_config_get` with `scope: "effective"` and honor these runtime behaviors:
   - `workflow.discuss_mode="discuss"`: run focused gray-area questioning and capture actual decisions
   - `workflow.discuss_mode="assumptions"`: surface evidence-backed assumptions, ask only for corrections, then capture the corrected decisions
   - `workflow.skip_discuss=true`: prefer a single-pass, repo-evidence-driven context capture instead of a long interactive loop
   - `workflow.research_before_questions=true`: inspect relevant local discovery/codebase artifacts before asking the user to choose between options
7. Read the current phase's existing artifacts through `mcp__blueprint__blueprint_phase_artifact_read` and inspect any saved checkpoint through `mcp__blueprint__blueprint_phase_checkpoint_get`.
8. If `XX-CONTEXT.md` already contains substantive content, require explicit overwrite confirmation before any replace path. Reuse is the default.
9. If a checkpoint exists and the user has not explicitly asked to discard it, prefer resuming from that checkpoint instead of starting over.
10. Use `mcp__blueprint__blueprint_artifact_scaffold` only to seed missing `XX-CONTEXT.md` or `XX-DISCUSSION-LOG.md` files. Do not treat scaffold output as the final artifact content.
11. Persist the actual context content through `mcp__blueprint__blueprint_phase_artifact_write` with `artifact: "context"`.
12. Write `XX-DISCUSSION-LOG.md` through `mcp__blueprint__blueprint_phase_artifact_write` with `artifact: "discussion-log"` only when durable audit notes add value beyond the main context artifact.
13. During long discovery flows, persist resumable state through `mcp__blueprint__blueprint_phase_checkpoint_put`. After successfully writing the final context artifact, delete that checkpoint through `mcp__blueprint__blueprint_phase_checkpoint_delete`.
14. Call `mcp__blueprint__blueprint_state_update` to record that `/blu-discuss-phase` completed and to set the next safe action inside the implemented Blueprint surface.
15. Return a concise summary covering the phase, reused versus replaced artifacts, checkpoint behavior, any warnings, and the next safe action.

Response requirements:
- Use only `mcp__blueprint__blueprint_phase_locate`, `mcp__blueprint__blueprint_phase_context`, `mcp__blueprint__blueprint_roadmap_read`, `mcp__blueprint__blueprint_artifact_list`, `mcp__blueprint__blueprint_config_get`, `mcp__blueprint__blueprint_phase_artifact_read`, `mcp__blueprint__blueprint_phase_artifact_write`, `mcp__blueprint__blueprint_phase_checkpoint_get`, `mcp__blueprint__blueprint_phase_checkpoint_put`, `mcp__blueprint__blueprint_phase_checkpoint_delete`, `mcp__blueprint__blueprint_artifact_scaffold`, and `mcp__blueprint__blueprint_state_update` for persistent state work.
- Keep writes inside the selected `.blueprint/phases/<phase>/` directory plus `.blueprint/STATE.md`.
- Treat overwrite as an explicit confirmation path, not the default.
- Capture real phase decisions, not just placeholder headings or scaffold text.
- Do not claim upstream-only power mode, batch mode, chain mode, or auto-advance behavior in this runtime.
- Do not advertise blocked lifecycle commands as runnable; prefer `/blu-progress` when follow-up routing is uncertain.
"""
