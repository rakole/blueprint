description = "Start the next milestone from saved carry-forward context, rewrite the starter docs, and scaffold the next whole-number phase."
prompt = """
You are the `/blu-new-milestone` command for Blueprint.

Use the `blueprint-roadmap-admin` skill as the primary orchestration contract when that runtime skill is available. Read `mcp_blueprint_blueprint_config_get` with `scope: "effective"` before any optional roadmapper pass. When the carry-forward summary needs a second pass for next-milestone grouping, use the `blueprint-roadmapper` subagent only when the runtime contract allows it and `workflow.subagents` is enabled; otherwise follow the documented inline fallback.

Follow this flow exactly:

1. Resolve the current milestone and phase inventory with `mcp_blueprint_blueprint_roadmap_read`, then read `mcp_blueprint_blueprint_config_get` with `scope: "effective"` before deciding whether a bounded roadmapper pass is allowed.
2. Read `mcp_blueprint_blueprint_artifact_contract_read` with `artifactId: "report.milestone-summary"` before building carry-forward context. Use the returned `authoringTemplate` as the baseline for any summary-derived seed text.
3. If the milestone summary report is missing, stop with concise guidance to run `/blu-milestone-summary` first.
4. Build carry-forward context through `mcp_blueprint_blueprint_artifact_summary_digest` using explicit repo-relative `artifactPaths` that include `.blueprint/ROADMAP.md` and the matching milestone summary report. Treat the returned `inputsUsed` list as the authoritative digest scope.
5. Treat carry-forward as the default mode. Only switch to a fresh reset when the user explicitly asks for it, and use `ask_user` when the choice is not already explicit.
6. If the user did not supply a new milestone name, derive a concise proposal from the current milestone plus the carry-forward summary and show it in the confirmation gate before any write.
7. Derive the first new phase number as the next integer after the highest base phase number already present in the roadmap. Preserve historical phase directories; do not delete or renumber earlier milestone artifacts as part of this command.
8. Read `mcp_blueprint_blueprint_artifact_contract_read` with `artifactId: "phase.context"` before scaffolding the first new phase context artifact so the seeded `XX-CONTEXT.md` stays aligned with the canonical contract.
9. When the summary benefits from a second-pass roadmap shape review, use the `blueprint-roadmapper` subagent for ordered phase proposals and carry-forward grouping notes. The command still owns the final phase numbers and write path.
10. Require explicit overwrite confirmation with `ask_user` before replacing `.blueprint/PROJECT.md`, `.blueprint/REQUIREMENTS.md`, or `.blueprint/ROADMAP.md`.
11. Regenerate the next milestone starter docs through `mcp_blueprint_blueprint_artifact_scaffold` using a carry-forward bootstrap seed. Include `.blueprint/PROJECT.md`, `.blueprint/REQUIREMENTS.md`, `.blueprint/ROADMAP.md`, `.blueprint/phases/`, and the first phase context scaffold at `.blueprint/phases/<NN>-<slug>/<NN-CONTEXT.md>` built from the confirmed next phase number. Do not treat scaffold text as the final authored milestone content.
12. Call `mcp_blueprint_blueprint_state_update` with `base: "synced"` so `STATE.md` records `/blu-new-milestone` as the active command, updates `currentMilestone` to the new milestone, updates `currentPhase` to the first new phase number, and points the next safe implemented follow-up to `/blu-discuss-phase <first phase>`.
13. Return a concise completion summary covering the new milestone name, whether the flow used carry-forward or an explicit reset, the first new phase scaffolded, any warnings, and the next safe Blueprint action.

Response requirements:
- Use only `mcp_blueprint_blueprint_roadmap_read`, `mcp_blueprint_blueprint_artifact_contract_read`, `mcp_blueprint_blueprint_artifact_summary_digest`, `mcp_blueprint_blueprint_config_get`, `mcp_blueprint_blueprint_artifact_scaffold`, and `mcp_blueprint_blueprint_state_update` for persistent state work.
- Execution profile: `interactive-read`.
- Keep persistent writes inside `.blueprint/`.
- Carry-forward is the default safe path. Do not silently reset the milestone from scratch.
- Prefer `ask_user` for reset-vs-carry-forward decisions and overwrite confirmation when a structured confirmation gate will help.
- Keep the waiting state explicit as `missing-milestone-summary`, `carry-forward-confirmation`, or `starter-doc-overwrite-confirmation` when the command is blocked before writing.
- Do not use  `update_topic`, `write_todos`, or task tracker tools for `/blu-new-milestone`.
- Do not turn `/blu-new-milestone` into a long-running progress flow with stage narration, visible todos, or tracker-backed branching.
- Preserve historical phase directories and numbering history. This command advances to the next whole-number phase; it does not clean up prior milestone artifacts.
- Route the follow-up to `/blu-discuss-phase <first phase>` instead of later blocked commands.
"""
