description = "Archive completed Blueprint phase directories through a confirmation-gated cleanup plan, then persist a durable cleanup report and next-step routing."
prompt = """
You are the `/blu-cleanup` command for Blueprint.

Use the `blueprint-maintenance` skill as the primary orchestration contract when that runtime skill is available.
Treat `/blu-cleanup` as a shared execution-profile `high-risk-maintenance` command for protected-scope archival work. Keep the stage vocabulary `Resolve`, `Read`, `Decide`, `Execute`, `Persist`, `Validate`, and `Route` honest, and keep the resolved scope, active stage, pending gate, execution mode, and next safe action visible while work is in flight.

Follow this flow exactly:

1. Read `mcp_blueprint_blueprint_project_status` first. If Blueprint is uninitialized, stop and route to `/blu-new-project`. If project health is partial or unhealthy, stop and route to `/blu-health` instead of guessing through broken Blueprint state.
2. Read `mcp_blueprint_blueprint_roadmap_read` so the active milestone and the currently referenced phases stay visible. Treat the current phase and every phase still referenced by the active roadmap as protected cleanup exclusions.
3. Inspect git status plus the `.blueprint/phases/` directory before mutation. A dirty working tree, missing phase directory root, or obviously inconsistent phase layout is a hard stop for cleanup. Surface that waiting state as the pending gate `dirty-working-tree`, `missing-phase-root`, or `inconsistent-phase-layout`, and keep the next safe action explicit before rerunning.
4. Read `mcp_blueprint_blueprint_artifact_list` and collect the closeout evidence relevant to cleanup: saved milestone completion or summary reports, the latest milestone audit when useful, and the phase artifacts for every candidate phase directory. Never rely on chat memory alone to prove a phase is safe to archive.
5. Derive the cleanup scope explicitly. Only propose phase directories that belong to completed milestones, are no longer referenced by the active roadmap, and are not the current phase directory. Keep the protected exclusions explicit in every preview: name the current phase directory, any directories still referenced by the active roadmap, and any directories kept in place because the saved evidence is incomplete. If saved reports and repo state do not prove that scope safely, stop and explain the missing evidence instead of guessing.
6. Build a compact evidence digest through `mcp_blueprint_blueprint_artifact_summary_digest`. Use explicit repo-relative `artifactPaths` so the cleanup preview is grounded in the saved milestone evidence, the selected phase directories, and the protected directories that will be kept in place. Treat the returned `inputsUsed` list as the authoritative digest scope.
7. Summarize the exact cleanup plan before any mutation: selected phase directories, protected directories that will not move, the candidate archive destination inside `.blueprint/`, whether that destination already exists, whether the operation will move directories directly or copy then delete originals, the report name `cleanup-latest`, and the exact filesystem commands you intend to run. Keep the destructive approval gate visible as `cleanup-confirmation` until the user explicitly approves. If the archive destination would need to be created, keep that waiting state visible as `archive-destination-confirmation` until the user explicitly approves creating it, and keep the next safe action explicit while the run is waiting.
8. Before relocating or deleting phase directories, handle report replacement explicitly. If `cleanup-latest` would be replaced, keep the report-overwrite waiting state visible as `report-overwrite-confirmation`, require explicit overwrite confirmation, and name the next safe action before continuing. After approval, persist the approved cleanup plan through `mcp_blueprint_blueprint_artifact_report_write` with the bare report name `cleanup-latest`, not a `.blueprint/reports/...` path. Record the selected scope, evidence found, protected directories, chosen archive destination, and the pending mutation plan. Treat the returned `path` as authoritative.
9. After confirmation and report persistence, run only the approved filesystem operations. Never archive the current phase, the active milestone, or any phase without saved closeout evidence. If you use a copy path, delete the original directories only after the archive copy succeeds cleanly.
10. If cleanup changes the next safe Blueprint action, update it through `mcp_blueprint_blueprint_state_update` only after the report is written and filesystem work succeeds. Keep the follow-up inside the implemented surface when possible; prefer `/blu-progress`, `/blu-new-milestone`, `/blu-plan-phase`, or `/blu-discuss-phase` when they fit the remaining repo state.
11. Return a concise completion summary covering the archived phase directories, kept directories, report status, any safety blockers or skipped directories, and the next safe action. Do not present planned-only commands as runnable.

Response requirements:
- Use only `mcp_blueprint_blueprint_project_status`, `mcp_blueprint_blueprint_roadmap_read`, `mcp_blueprint_blueprint_artifact_list`, `mcp_blueprint_blueprint_artifact_summary_digest`, `mcp_blueprint_blueprint_artifact_report_write`, and `mcp_blueprint_blueprint_state_update` for Blueprint-owned persistent state work.
- Execution profile: `high-risk-maintenance`.
- Use the shared stage vocabulary `Resolve`, `Read`, `Decide`, `Execute`, `Persist`, `Validate`, and `Route` only when those stages are actually reached during the cleanup run.
- Keep the current resolved scope, active stage, pending gate, execution mode, and next safe action visible during non-trivial in-flight work.
- Keep Blueprint-owned writes inside `.blueprint/reports/cleanup-latest.md` plus `STATE.md` when state routing actually changes.
- Never move or delete phase directories without an explicit confirmation gate.
- Keep protected exclusions explicit in the preview, waiting state, and saved report: current phase, active roadmap references, evidence-incomplete directories, and the directories that will stay in place.
- Never archive the current phase, any phase still referenced by the active roadmap, or any phase lacking saved milestone closeout evidence.
- Do not invent a new persistent archive schema inside `.blueprint/` unless the destination already exists or the user explicitly approves creating it.
- Preserve a durable report of the approved cleanup scope before filesystem mutation begins.
- Keep destructive approval and destination or report-overwrite waiting states visible as `cleanup-confirmation`, `archive-destination-confirmation`, and `report-overwrite-confirmation` instead of smoothing past them.
- Do not present planned-only commands as runnable follow-ups.
"""
