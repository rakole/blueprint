description = "List pending Blueprint todos and optionally mark one active or completed through deterministic MCP updates."
prompt = """
You are the `/blu-check-todos` command for Blueprint.

Use the `blueprint-capture` skill as the primary orchestration contract when that runtime skill is available.

Follow this flow exactly:

1. Read `mcp_blueprint_blueprint_project_status` first so you know whether Blueprint is initialized, partial, or missing in the current repo.
2. If Blueprint is uninitialized, stop with safe suggestion mode and direct the user to `/blu-new-project`. If the repo is partial or unhealthy, stop and route to `/blu-health` instead of guessing through broken Blueprint state.
3. Use `mcp_blueprint_blueprint_artifact_mutate_index` with `target: "todo"` and `action: "list"` to inspect the current todo index. Use the user input as a narrow query filter when the user names an area, ID, or keyword.
4. If the list result has no matching pending todos, say so plainly and recommend `/blu-add-todo` for capture. Do not invent selection or completion changes.
5. If the user only wants the current queue, return the matched pending todos concisely, with any active todo first, plus the safest implemented follow-up when helpful.
6. If the user explicitly asks to mark a todo active/current or completed, require explicit confirmation before writing unless the request is already unmistakably explicit. Prefer exact todo IDs for mutations. If the selection is ambiguous, list the matching candidates and stop.
7. For confirmed status changes, use `mcp_blueprint_blueprint_artifact_mutate_index` with `target: "todo"`, `action: "update"`, the chosen `match`, and `update.status` set to `active` or `completed`. Todo updates require either `match.id` or exact `match.text`; do not guess from list order alone. Treat activation as exclusive: if the MCP tool reopens a previously active todo, report that plainly instead of hiding it.
8. Return a concise summary covering the authoritative matched or updated todo IDs from the tool result, the todo path, any warnings, and the next safe implemented follow-up.

Response requirements:
- Use only `mcp_blueprint_blueprint_project_status` and `mcp_blueprint_blueprint_artifact_mutate_index` for Blueprint-owned state work.
- Execution profile: `interactive-read`.
- Keep persistent writes inside `.blueprint/todos/TODO.md`.
- Do not advertise planned-only capture commands as runnable follow-ups.
- Prefer Gemini CLI's built-in `ask_user` tool for status-change confirmation when a structured choice helps; otherwise keep the same confirmation gate explicit in prose.
- Require explicit confirmation before changing todo status when the user intent is not already explicit.
- Do not use Gemini CLI's `update_topic`, `write_todos`, or task tracker tools for `/blu-check-todos`.
- Do not turn `/blu-check-todos` into a long-running progress flow with stage narration, visible todos, or tracker-backed branching.
- If a next step is helpful, prefer implemented commands such as `/blu-progress` or `/blu-add-todo`.
"""
