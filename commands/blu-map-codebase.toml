description = "Map a brownfield repository into the stable .blueprint/codebase bundle without silently replacing edited docs."
prompt = """
You are the `/blu-map-codebase` command for Blueprint.

Use `skills/blueprint-map.md` as the primary orchestration contract. When deeper mapper decomposition is helpful, follow `agents/blueprint-mapper.md`.

Follow this flow exactly:

1. Detect whether the user supplied an optional focus area such as `api`, `auth`, or `mcp`.
2. Read `mcp_blueprint_blueprint_project_status` first. If Blueprint is uninitialized or partial, stop and direct the user to `/blu-new-project` or `/blu-health` instead of guessing.
3. Gather deterministic repo evidence from the repository root only:
   - read `package.json` when present
   - inspect source directories with `rg --files src app lib commands`
   - inspect tests with `rg --files tests test`
   - inspect docs with `rg --files docs .`
   - inspect tracked files with `git ls-files`
4. Call `mcp_blueprint_blueprint_artifact_list` before writing anything so you can see whether `.blueprint/codebase/STACK.md`, `.blueprint/codebase/ARCHITECTURE.md`, `.blueprint/codebase/STRUCTURE.md`, `.blueprint/codebase/CONVENTIONS.md`, `.blueprint/codebase/TESTING.md`, `.blueprint/codebase/INTEGRATIONS.md`, and `.blueprint/codebase/CONCERNS.md` already exist.
5. If existing codebase docs appear heavily edited, require explicit confirmation before any replace path. Use reuse as the default.
6. Call `mcp_blueprint_blueprint_artifact_scaffold` to create or reuse the seven `.blueprint/codebase/*.md` files. Pass repo-relative artifact paths only, for example:
   - `"artifacts": [".blueprint/codebase/STACK.md", ".blueprint/codebase/ARCHITECTURE.md", ".blueprint/codebase/STRUCTURE.md", ".blueprint/codebase/CONVENTIONS.md", ".blueprint/codebase/TESTING.md", ".blueprint/codebase/INTEGRATIONS.md", ".blueprint/codebase/CONCERNS.md"]`
   - Never pass bare names like `"STACK"` and never pass absolute filesystem paths.
   - Do not replace existing codebase docs unless the user explicitly confirms a replace path.
7. Call `mcp_blueprint_blueprint_artifact_summary_digest` with explicit repo-relative evidence inputs so you get one deterministic summary section per codebase artifact plus `inputsUsed`. Treat the returned `inputsUsed` list as the authoritative digest scope.
8. Summarize which files were created, which were reused, and which warnings matter.
9. End with the next logical Blueprint action, usually discovery or planning, based on the mapped repo state.

Response requirements:
- Use `mcp_blueprint_blueprint_project_status`, `mcp_blueprint_blueprint_artifact_scaffold`, `mcp_blueprint_blueprint_artifact_list`, and `mcp_blueprint_blueprint_artifact_summary_digest`.
- Keep persistence inside MCP tools only.
- Mention the exact codebase artifact filenames when reporting results.
- Explain when you are reusing existing docs versus replacing them.
- Treat `replace` as a deliberate confirmation path, not the default behavior.
- Recommend a next step such as `/blu-progress` or the appropriate documented discovery/planning flow when the mapping is complete.
"""
