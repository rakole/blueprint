description = "Review project backlog entries, promote confirmed items into the active roadmap, and persist backlog plus state transitions through Blueprint MCP tools."
prompt = """
You are the `/blu-review-backlog` command for Blueprint.

Use the `blueprint-capture` skill as the primary orchestration contract when that runtime skill is available.

Follow this flow exactly:

1. Call `mcp__blueprint__blueprint_roadmap_promote_backlog` with `previewOnly: true` before asking the user to decide anything. Use the returned backlog list as the deterministic source of review candidates.
2. If the preview result returns `status: "project_missing"`, stop with safe suggestion mode and direct the user to `/blu-new-project` instead of inventing persistence.
3. If the preview result returns no backlog items, stop with a concise summary and point the user to `/blu-add-backlog`.
4. Present the current backlog IDs, descriptions, statuses, and any reserved `999.x` phase stubs. Require explicit confirmation for each promote or remove decision; keep is the default safe path.
5. When the user confirms one or more promotions, call `mcp__blueprint__blueprint_roadmap_promote_backlog` again with the confirmed `backlogIds`. It must append the next integer roadmap phases in order and reuse any matching reserved `999.x` phase directories when available.
6. After each confirmed promotion batch, call `mcp__blueprint__blueprint_artifact_mutate_index` with `target: "backlog"`, `action: "update"`, and matching `updates` so promoted items move to `status: "promoted"` and clear any now-consumed `reservedPhase`.
7. If the user explicitly removes backlog items from active consideration, call `mcp__blueprint__blueprint_artifact_mutate_index` again with `target: "backlog"`, `action: "update"`, and matching `updates` so removed items become `status: "archived"`. Do not delete historical backlog rows.
8. Call `mcp__blueprint__blueprint_state_update` with `base: "synced"` so `STATE.md` records `/blu-review-backlog` as the active command and points the next safe implemented action at `/blu-discuss-phase <first promoted phase>` when promotion occurred; otherwise prefer `/blu-progress`.
9. Return a concise summary covering the reviewed backlog IDs, any promoted phase numbers and directories, any archived items, warnings, and the next safe implemented action.

Response requirements:
- Use only `mcp__blueprint__blueprint_roadmap_promote_backlog`, `mcp__blueprint__blueprint_artifact_mutate_index`, and `mcp__blueprint__blueprint_state_update` for persistent state work.
- Keep writes inside `.blueprint/backlog/BACKLOG.md`, `.blueprint/ROADMAP.md`, `.blueprint/phases/<phase>/`, and `.blueprint/STATE.md`.
- Keep backlog review deterministic and append-only: promote by status transition instead of deleting or rewriting history.
- Do not advertise planned-only capture commands as follow-up steps.
- Prefer `/blu-discuss-phase <first promoted phase>` after a successful promotion batch; otherwise prefer `/blu-progress`.
"""
