description = "Restore the latest Blueprint pause handoff, re-anchor STATE.md on live project state, and surface the next safe implemented action."
prompt = """
You are the deprecated `/blu:resume-work` compatibility command for Blueprint.
Canonical direct command path: `/blu-resume-work`.
Always prefer the canonical dash-form command in user-visible guidance.

Use the `blueprint-governance` skill as the primary orchestration contract when that runtime skill is available.

Follow this flow exactly:

1. Call `mcp__blueprint__blueprint_project_status` first so you know whether Blueprint is initialized and what the current safe next action is.
2. Call `mcp__blueprint__blueprint_state_load` to inspect the current stored state, blockers, and derived next-step guidance.
3. Call `mcp__blueprint__blueprint_artifact_list` to inspect the current Blueprint artifact and report inventory.
4. Call `mcp__blueprint__blueprint_pause_handoff_get` to load the canonical pause handoff report.
5. If Blueprint is uninitialized or partial, stop and route to `/blu-new-project` or `/blu-health` using the exact guidance from `mcp__blueprint__blueprint_project_status`. Do not pretend resume-work can bootstrap or repair the repo.
6. If no pause handoff exists, explain exactly which handoff is missing, preserve the current safe next action, and only call `mcp__blueprint__blueprint_state_update` if you need to record `/blu-resume-work` as the attempted command while keeping `STATE.md` aligned with the existing derived next step.
7. If a pause handoff exists, summarize the saved stopping point, completed work, remaining work, decisions, blockers, pending human actions, modified files, context notes, and artifact snapshot before choosing the next action.
8. Treat the saved handoff as canonical resume context, but treat the live project state plus current phase artifacts as the source of truth for the next safe action. Do not let a stale handoff override newer Blueprint state.
9. When the pause handoff is still active, call `mcp__blueprint__blueprint_state_update` with the stored base to set `activeCommand` to `/blu-resume-work` and advance `lastUpdated` so the pause handoff no longer overrides live routing.
10. Re-read `mcp__blueprint__blueprint_state_load` and `mcp__blueprint__blueprint_project_status` after the resume-state transition so the resumed next action comes from current project state and phase artifacts, not only from the saved note.
11. Call `mcp__blueprint__blueprint_state_update` again so `STATE.md` records `/blu-resume-work`, the current milestone and phase, any remaining blockers, and the resumed next safe implemented action.
12. Return a concise completion summary covering the handoff path, whether the saved handoff was active or historical, the recovered stopping point, any blockers or missing artifacts, and the resumed next safe implemented action.

Safety requirements:
- Use only `mcp__blueprint__blueprint_project_status`, `mcp__blueprint__blueprint_state_load`, `mcp__blueprint__blueprint_artifact_list`, `mcp__blueprint__blueprint_pause_handoff_get`, and `mcp__blueprint__blueprint_state_update` for persistent state work.
- Keep persistent writes limited to `.blueprint/STATE.md`.
- Preserve the canonical pause handoff report; do not rewrite or delete `.blueprint/reports/pause-work-latest.md`.
- Do not mutate roadmap, phase, config, or code artifacts.
- Do not present planned-only commands as runnable; if the best follow-up is read-only, recommend `/blu-progress`.
"""
