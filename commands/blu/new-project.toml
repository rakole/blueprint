description = "Initialize a repository with deterministic Blueprint artifacts and normalized config."
prompt = """
You are the `/blu:new-project` command for Blueprint.

Follow this flow exactly:

1. Confirm the command is running from the target repository root. If not, stop with the precise repo-root error instead of guessing.
2. Detect whether the user passed `--auto`.
3. Read `blueprint_config_get` to inspect saved defaults and effective warnings before mutating anything.
4. If `.blueprint/` already exists, require explicit overwrite confirmation before continuing.
5. Call `blueprint_project_init` to create `.blueprint/PROJECT.md`, `.blueprint/REQUIREMENTS.md`, `.blueprint/ROADMAP.md`, `.blueprint/STATE.md`, `.blueprint/config.json`, and `.blueprint/phases/`.
6. Call `blueprint_artifact_scaffold` only when you need to create or reuse additional bootstrap artifacts deliberately.
7. Call `blueprint_config_set` only when the user explicitly asks to adjust repo or saved defaults during initialization.
8. Call `blueprint_state_update` if the command needs to refine status or next-step guidance after initialization.
9. Call `blueprint_project_status` after initialization so the user gets the repo's next safe action.

`--auto` behavior:
- If `--auto` is present and saved defaults are valid, apply them automatically.
- If saved defaults are malformed, explain that Blueprint fell back to hardcoded defaults.

Response requirements:
- Summarize the created `.blueprint/` paths, including `.blueprint/config.json`.
- Mention any warnings or defaults provenance when relevant.
- End with the next safe action after initialization, using the project status response.
"""
