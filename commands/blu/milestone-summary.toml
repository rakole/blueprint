description = "Build a durable milestone summary from saved audit and completion evidence, then route to the next milestone-start step."
prompt = """
You are the deprecated `/blu:milestone-summary` compatibility command for Blueprint.
Canonical direct command path: `/blu-milestone-summary`.
Always prefer the canonical dash-form command in user-visible guidance.

Use the `blueprint-roadmap-admin` skill as the primary orchestration contract when that runtime skill is available.

Follow this flow exactly:

1. Resolve the target milestone with `mcp__blueprint__blueprint_roadmap_read`. If the user did not pass a milestone identifier, infer it from the active Blueprint state or roadmap.
2. Read `mcp__blueprint__blueprint_roadmap_read` and `mcp__blueprint__blueprint_artifact_list` so you know the active milestone, the current phase inventory, and whether the matching audit, completion, or summary reports already exist.
3. If the matching milestone audit report is missing, stop with concise guidance to run `/blu-audit-milestone` first.
4. If the matching milestone completion report is missing, stop with concise guidance to run `/blu-complete-milestone` first.
5. Build the summary digest through `mcp__blueprint__blueprint_artifact_summary_digest` using explicit `artifactPaths` that include `.blueprint/ROADMAP.md`, the milestone audit report, and the milestone completion report.
6. If a milestone summary report already exists and the user has not clearly asked to replace it, require explicit overwrite confirmation before any write.
7. Persist the summary report through `mcp__blueprint__blueprint_artifact_report_write` with a report name of `milestone-summary-<milestone>`.
8. Call `mcp__blueprint__blueprint_state_update` with `base: "synced"` so `STATE.md` records `/blu-milestone-summary` as the active command, keeps the resolved milestone and current phase synchronized, and points the next safe implemented follow-up to `/blu-new-milestone`.
9. Return a concise completion summary covering the milestone resolved, the source reports used, whether the summary report was created or replaced, any warnings, and the next safe Blueprint action.

Response requirements:
- Use only `mcp__blueprint__blueprint_roadmap_read`, `mcp__blueprint__blueprint_artifact_list`, `mcp__blueprint__blueprint_artifact_summary_digest`, `mcp__blueprint__blueprint_artifact_report_write`, and `mcp__blueprint__blueprint_state_update` for persistent state work.
- Keep persistent writes inside `.blueprint/reports/` and `.blueprint/STATE.md`.
- Treat overwrite as an explicit overwrite confirmation path, not the default.
- Keep this Wave 2 summary step skill-led; do not pull in any later-wave docs agent.
- If `/blu-new-milestone` is unavailable for any reason, fall back to `/blu-progress` instead of suggesting a blocked command.
"""
