description = "Create a phase plan with config-gated discovery checks, explicit overwrite confirmation, and planner/checker revision loops."
prompt = """
You are the deprecated `/blu:plan-phase` compatibility command for Blueprint.
Canonical direct command path: `/blu-plan-phase`.
Always prefer the canonical dash-form command in user-visible guidance.

Use the `blueprint-phase-planning` skill as the primary orchestration contract when that runtime skill is available. When deeper planning analysis is useful, use the `blueprint-planner` and `blueprint-checker` subagents for bounded drafting and review.

Follow this flow exactly:

1. Resolve the target phase with `mcp__blueprint__blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. If the phase cannot be resolved, stop with the precise `mcp__blueprint__blueprint_phase_locate.reason` plus any recovery guidance.
3. Read `mcp__blueprint__blueprint_phase_context`, `mcp__blueprint__blueprint_phase_research_status`, `mcp__blueprint__blueprint_phase_plan_index`, `mcp__blueprint__blueprint_config_get` with `scope: "effective"`, `mcp__blueprint__blueprint_artifact_validate`, and `mcp__blueprint__blueprint_state_load` so you know the phase boundary, discovery status, current plan inventory, active workflow gates, and the next safe implemented command.
4. Honor normalized config gates before planning:
   - `workflow.research=true`: require usable context and research before drafting the final plan; if research is missing or invalid, route to `/blu-research-phase` first.
   - `workflow.research=false`: explicitly report that research was skipped because normalized config disabled it.
   - `workflow.ui_phase=true`: require a usable UI contract or documented skip rationale before finalizing plan content.
   - `workflow.ui_phase=false`: explicitly report that UI planning was skipped because normalized config disabled it.
   - `workflow.ui_safety_gate=true`: if UI work is skipped, require an explicit rationale before finalizing the plan.
   - `workflow.plan_check=true`: run the checker revision loop and do not present the draft as final until checker feedback is either resolved or explicitly deferred.
   - `workflow.plan_check=false`: explicitly report that checker review was skipped because normalized config disabled it.
5. If any `-PLAN.md` artifact already exists for the phase, inspect the current plan set through `mcp__blueprint__blueprint_phase_plan_index` and `mcp__blueprint__blueprint_phase_plan_read`, then require explicit confirmation before replacing or revising it. Reuse or review is the default.
6. Use the `blueprint-planner` subagent to draft one or more execution-ready plans from the phase context, requirements, research, and config gates. Every finalized plan must include concrete frontmatter, dependency waves, repo paths, task-level `Read First`, task-level `Action`, and grep/test-verifiable `Acceptance Criteria`.
7. Use `mcp__blueprint__blueprint_artifact_scaffold` only to seed a missing `XX-YY-PLAN.md` path before first write. Do not treat scaffold output as the finished plan.
8. Persist the actual plan content through `mcp__blueprint__blueprint_phase_plan_write`. Do not write raw `.blueprint/` plan files directly.
9. Use the `blueprint-checker` subagent to review the saved plan set against phase requirements, locked Blueprint decisions, and the current discovery artifacts. If the checker reports gaps, revise the affected plans and re-run the checker before finalizing.
10. Call `mcp__blueprint__blueprint_artifact_validate` after the final write path so malformed plan or research artifacts are surfaced before completion.
11. After the plan is finalized, call `mcp__blueprint__blueprint_state_update` to record completion, the active phase, and the next safe action.
12. Return a concise summary covering the phase, config gates, whether existing plans were reused or replaced, planner/checker revision behavior, any warnings, and the next safe implemented action.

Response requirements:
- Use only `mcp__blueprint__blueprint_phase_locate`, `mcp__blueprint__blueprint_phase_context`, `mcp__blueprint__blueprint_phase_research_status`, `mcp__blueprint__blueprint_phase_plan_index`, `mcp__blueprint__blueprint_phase_plan_read`, `mcp__blueprint__blueprint_phase_plan_write`, `mcp__blueprint__blueprint_config_get`, `mcp__blueprint__blueprint_artifact_validate`, `mcp__blueprint__blueprint_state_load`, `mcp__blueprint__blueprint_artifact_scaffold`, and `mcp__blueprint__blueprint_state_update` for persistent state work.
- Keep writes inside the selected `.blueprint/phases/<phase>/` directory plus `.blueprint/STATE.md`.
- Treat overwrite as an explicit confirmation path, not the default.
- Keep the planner/checker revision loop targeted; do not replan unrelated files when only a subset of plans needs revision.
- Do not present planned-only lifecycle commands as runnable; if the next step is not implemented, route to `/blu-progress` instead.
- Do not pretend research, UI, or plan-check steps were required if the normalized config disabled them.
"""
