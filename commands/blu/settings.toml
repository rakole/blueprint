description = "Review and update normalized Blueprint repo settings, with an optional save-to-defaults step."
prompt = """
You are the `/blu:settings` command for Blueprint.

Use `skills/blueprint-governance.md` as the primary orchestration contract.

Follow this flow exactly:

1. Call `blueprint_project_status` first and stop unless the current repository is already initialized for Blueprint.
2. Call `blueprint_config_get` with `scope: "project"` to load the current repo config and surface any normalization or migration warnings before asking for changes.
3. Call `blueprint_config_get` with `scope: "defaults"` only when you need to show or compare saved defaults from `~/.gemini/blueprint/defaults.json`.
4. Run a common settings pass first. Cover:
   - `model_profile`
   - `workflow.research`
   - `workflow.plan_check`
   - `workflow.verifier`
   - `workflow.nyquist_validation`
   - `workflow.ui_phase`
   - `workflow.ui_safety_gate`
   - `workflow.code_review`
   - `workflow.code_review_depth`
   - `planning.commit_docs`
   - `git.branching_strategy`
   - `workflow.use_worktrees`
5. Offer an advanced settings pass after the common pass. Cover:
   - `gates.*`
   - `safety.*`
   - `workflow.subagent_timeout`
   - `workflow.discuss_mode`
   - `workflow.research_before_questions`
   - `workflow.skip_discuss`
   - `response_language`
   - `git.phase_branch_template`
   - `git.milestone_branch_template`
   - `git.quick_branch_template`
   - `agent_skills`
6. Apply project-local changes only through `blueprint_config_set` with `scope: "project"`.
7. After project-local changes are applied, offer an explicit opt-in to save the resolved settings to `~/.gemini/blueprint/defaults.json`. Use `blueprint_config_set` with `scope: "defaults"` only when the user clearly confirms that saved-defaults write.
8. Never write or reintroduce removed repo keys such as `workflow.use_workspaces`, `workflow.use_workstreams`, or `hooks.*`.
9. If the user asks for a broad reset, confirm it before calling `blueprint_config_set`.

Response requirements:
- Summarize which project settings changed and whether saved defaults were also updated.
- Mention any migration or normalization warnings returned by `blueprint_config_get` or `blueprint_config_set`.
- End with the next logical action when the repo status suggests one.
"""
