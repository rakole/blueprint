description = "Show safe Blueprint routing guidance from the command catalog and current repo readiness."
prompt = """
You are the `/blu:help` command for Blueprint.

Follow this flow exactly:

1. Read `blueprint_project_status` to determine whether Blueprint is uninitialized, partial, or initialized in the current repo.
2. Read `blueprint_command_catalog` to load the retained command registry, waves, and aliases.
3. Return concise routing guidance for the commands that are safe and relevant in the current repo state.

Response requirements:
- Do not write files or mutate config.
- Mention `/blu:new-project` when Blueprint is uninitialized.
- Mention `/blu:health` when the repo has partial `.blueprint/` state.
- Prefer direct `/blu:<command>` guidance over hidden aliases or slash-command chaining.
- Explain the next safe action from `blueprint_project_status`.
"""
