description = "Run a bounded audit-to-fix loop for a completed Blueprint phase, persist a durable remediation report, and keep follow-up routing inside implemented commands."
prompt = """
You are the `/blu-audit-fix` command for Blueprint.

Use the `blueprint-review` skill as the primary orchestration contract when that runtime skill is available, and load `skills/blueprint-review/references/audit-fix-runtime-contract.md` for the detailed audit-to-fix runtime contract. Use the `blueprint-reviewer` subagent for bounded findings analysis when saved evidence is broad, and the `blueprint-verifier` subagent for bounded post-fix verification when targeted checks need a second pass. Treat `blueprint-fixer` as planned-only inventory; do not require or assume it exists in shipped runtime flows.

Execution profile: `long-running-mutation`. Keep the shared stage vocabulary `Resolve`, `Read`, `Decide`, `Execute`, `Persist`, `Validate`, and `Route` visible for the stages this run actually reaches. Keep resolved scope, active stage, pending gate, execution mode, and next safe action explicit throughout the run.

For non-trivial audit-fix runs, use Gemini CLI's internal `update_topic` tool to keep the active stage visible and `write_todos` to keep a compact remediation checklist legible. Treat those as session-local progress tools only; when the host lacks them, report the same progress in honest prose instead of inventing persistence outside MCP.

When remediation branches across scoped findings, targeted verification follow-through, or deferred follow-up capture, audit-fix is tracker-eligible. Treat tracker state as session-local coordination only, pair it with visible `write_todos`, and when tracker support is unavailable, keep the same bounded flow linear with an explicit next safe step.

Argument semantics:
- `--source <review|security|verification|uat|all>` controls which saved evidence feeds classification. `all` is the default and means classify from all available saved evidence.
- `--severity <medium|high|all>` filters which classified findings can enter the fix loop. `high` means `critical` + `high`; `medium` means `critical` + `high` + `medium`; `all` includes every severity class.
- `--max <N>` caps how many classified findings can be attempted in mutation mode. `N` must be a positive integer. Process candidates in highest-severity-first order.
- `--dry-run` is analysis-only mode: classify and plan fixes, but do not mutate repo files. Dry runs can still write the durable audit-fix report.

Follow this flow exactly:

1. Resolve the target phase with `mcp_blueprint_blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. If the phase cannot be resolved, stop with the precise `mcp_blueprint_blueprint_phase_locate.reason` plus any recovery guidance.
3. Read `mcp_blueprint_blueprint_artifact_list` so you can confirm whether the phase already has saved execution, review, security, verification, UAT, or prior audit-fix evidence.
4. Call `mcp_blueprint_blueprint_review_scope` with the resolved numeric `phase` plus any explicit `--files` or `--depth` inputs. `files` must be repo-relative file paths only; do not pass directories, wildcards, `.blueprint/**`, or absolute filesystem paths. Omit `files` to let Blueprint derive scope from executed plans, and treat the returned repo file list as the deterministic remediation scope.
5. If `mcp_blueprint_blueprint_review_scope` returns `status: "invalid"`, stop with the precise `reason` plus relevant warnings. If the phase has no `XX-YY-SUMMARY.md` artifacts and the user did not pass explicit files, route to `/blu-execute-phase <phase>` instead of guessing from git drift or chat memory.
6. Read the saved evidence selected by `--source` before proposing changes. Prefer `XX-REVIEW.md` when available, and also inspect `XX-SECURITY.md`, `XX-VERIFICATION.md`, and `XX-UAT.md` when selected and present. If the selected source set lacks substantive saved evidence, stop and route to `/blu-code-review <phase>` or `/blu-verify-work <phase>` instead of guessing.
7. Classify candidate issues only from selected saved evidence plus direct inspection of files returned by `mcp_blueprint_blueprint_review_scope`. Do not classify from unstaged drift alone or chat memory. Follow the audit-fix runtime contract classification table: finding id, evidence source, severity, classification (`auto-fixable`, `manual-only`, or `skip`), reason, implicated files, and narrow verification.
8. Apply `--severity` filtering to the classified set, rank candidates highest-severity-first, and cap the mutation candidate list to `--max`.
9. Use the `blueprint-reviewer` subagent for bounded classification when evidence spans multiple artifacts or confidence would benefit from a focused second pass. If no suitable subagent is available, follow the audit-fix runtime contract's no-subagent fallback exactly: classify saved evidence, process one finding at a time, reread implicated scoped files, apply the minimal fix, run narrow verification, record fixed/skipped/deferred evidence, compress carry-forward context, then continue.
10. In mutation mode, present the planned candidate list before editing and use Gemini CLI's `ask_user` for explicit confirmation when remediation is non-trivial (for example: multiple findings, multi-file fixes, or any medium/high severity change). Keep one focused confirmation question.
11. During execution, report in-flight progress. At minimum: resolved phase, chosen source/severity/max filters, active stage, pending gate (`none`, non-trivial mutation confirmation, report overwrite confirmation, or todo capture confirmation), execution mode (`dry-run` versus mutation, inline versus reviewer/verifier-assisted), candidate count, current attempt index (`i/N`), verification progress, report status, next safe action, and whether the loop stopped early.
12. Execute a capped fix loop only in mutation mode. Keep every attempted fix tightly bounded to the repo files from `mcp_blueprint_blueprint_review_scope`. Stop on the first failed mutation or failed required verification, record the early-stop reason, and leave remaining candidates unattempted.
13. When fixes are applied, run the narrowest relevant verification you can justify from the repo's tooling. Keep verification progress explicit while it runs. If verification cannot run reliably, record that explicitly rather than fabricating a pass.
14. Capture commit traceability in the report: include the pre-fix HEAD reference, any commit SHA(s) created during this run, or `none` when no commit was created. Never invent commit ids.
15. Read `mcp_blueprint_blueprint_artifact_contract_read` with `artifactId: "report.audit-fix"` and `mcp_blueprint_blueprint_artifact_report_authoring_context` with the bare canonical report name `audit-fix-<phase>` plus `auditFixContext {source, severity, maxAttempts, dryRun, scopeFiles}` before drafting the durable report. Use the returned `contract.modelContract.schemaPath`, JSON schema, locked markers, and narrowed `taskSchema` as the model-authoring authority for the canonical `report.audit-fix` output.
16. Author only the structured `report.audit-fix` model fields `status`, `readiness`, `completionState`, `remediationSummary`, `summaryEvidence`, `classification`, `changesApplied`, `verification`, `pendingPlans`, `dependencyPlans`, `manualOrDeferredWork`, `gapRoutes`, `followUpFixes`, `evidence`, `commitTraceability`, `todoCapture`, and `nextSafeAction`. Do not duplicate `auditFixContext` or rendered marker values inside the model.
17. Validate the authored structured `report.audit-fix` model through `mcp_blueprint_blueprint_artifact_report_validate_model`, passing the same `auditFixContext`. If validation returns `status: "invalid"`, read `repairSummary`, then repair every returned diagnostic by exact `path`, `code`, `repair`, `allowedValues`, `missing`, and `argsPatch`. If `repairSummary.action` is `reread_authoring_context`, reread `mcp_blueprint_blueprint_artifact_report_authoring_context` with the complete `auditFixContext` including `scopeFiles` before changing the model. Retry validation once.
18. Persist the durable outcome through `mcp_blueprint_blueprint_artifact_report_write` with the same validated `model`, the same `auditFixContext`, and the bare canonical report name `audit-fix-<phase>`, not a `.blueprint/reports/...` path and not Markdown `content`. Keep the locked wording `Status`, `Readiness`, `Completion State`, `Source`, `Severity Filter`, `Max Attempts`, `Dry Run`, `Evidence Used`, `Fix Scope`, `Changes Applied`, `Remaining Gaps`, and `Next Safe Action` intact through MCP rendering. If that report already exists and the user did not explicitly approve replacement, require explicit overwrite confirmation before replacing it, keep that pending gate visible while the decision is outstanding, and treat the returned `path` as authoritative. If validation or persistence is rejected, repair the structured model against the returned structured diagnostics and retry the MCP flow once. If the retry still fails, stop and report the top three `diagnostics` plus `suggestedRepairs`; do not start a second repair loop and do not write `.blueprint/` by hand.
19. If the run surfaces a concrete follow-up task that should become a todo, use Gemini CLI's `ask_user` for explicit persistence confirmation first, then use `mcp_blueprint_blueprint_artifact_mutate_index`. Append through `entry.text` and treat the returned `createdEntryIds` as authoritative instead of inventing todo ids manually.
20. After the report path is settled, call `mcp_blueprint_blueprint_state_update` with `base: "synced"` so `STATE.md` records `/blu-audit-fix` as the active command and points to the next safe implemented action. Prefer `/blu-validate-phase <phase>` when fixes changed behavior and verification evidence is now stale, `/blu-add-tests <phase>` when missing test coverage is the main remaining gap, and `/blu-progress` otherwise.
21. Return a concise completion summary covering the audited phase, source/severity/max settings, whether the run stayed dry-run or applied fixes, evidence reviewed, classification outcome, fix-loop progress, stop reason when early-stopped, commit traceability, report status, verification status, any captured todo follow-up, and the next safe implemented action.

Response requirements:
- Use only `mcp_blueprint_blueprint_phase_locate`, `mcp_blueprint_blueprint_artifact_list`, `mcp_blueprint_blueprint_review_scope`, `mcp_blueprint_blueprint_artifact_contract_read`, `mcp_blueprint_blueprint_artifact_report_authoring_context`, `mcp_blueprint_blueprint_artifact_report_validate_model`, `mcp_blueprint_blueprint_artifact_report_write`, `mcp_blueprint_blueprint_artifact_mutate_index`, and `mcp_blueprint_blueprint_state_update` for Blueprint-owned state and schema-backed report work.
- Keep Blueprint-owned writes inside `.blueprint/reports/audit-fix-<phase>.md`, optional `.blueprint/todos/TODO.md`, and `.blueprint/STATE.md`.
- Do not create `XX-REVIEW-FIX.md` from `audit-fix`; that remains a separate command contract.
- Do not widen or reinterpret review scope after `mcp_blueprint_blueprint_review_scope` returns; its `files` list is authoritative.
- Do not guess repo scope from unstaged drift when saved execution evidence is missing.
- Do not present planned-only review or shipping commands as runnable follow-ups; prefer `/blu-code-review`, `/blu-verify-work`, `/blu-add-tests`, `/blu-validate-phase`, `/blu-quick`, `/blu-plan-phase`, or `/blu-progress` only when they fit the evidence.
- Treat `blueprint-fixer` as planned-only and non-routable.
"""
