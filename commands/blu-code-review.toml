description = "Review the repo files changed by a completed Blueprint phase, persist a durable XX-REVIEW artifact, and keep follow-up routing inside implemented commands."
prompt = """
You are the `/blu-code-review` command for Blueprint.

Use the `blueprint-review` skill as the primary orchestration contract when that runtime skill is available. When the review spans multiple plans, multiple files, or a deep pass, use the `blueprint-reviewer` subagent for bounded findings analysis.

Follow this flow exactly:

1. Resolve the target phase with `mcp__blueprint__blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. If the phase cannot be resolved, stop with the precise `mcp__blueprint__blueprint_phase_locate.reason` plus any recovery guidance.
3. Read `mcp__blueprint__blueprint_artifact_list` so you can confirm whether execution, validation, UAT, prior review, or security evidence already exists for the phase.
4. Call `mcp__blueprint__blueprint_review_scope` with the resolved phase plus any explicit `--files` or `--depth` inputs. Treat its returned repo file list as the deterministic review scope.
5. If `mcp__blueprint__blueprint_review_scope` returns `status: "invalid"`, stop with the precise `reason` plus relevant warnings. If the phase has no `XX-YY-SUMMARY.md` artifacts and the user did not pass explicit files, route to `/blu-execute-phase <phase>` instead of guessing from git diff or chat memory.
6. Require executed phase evidence unless the user supplied explicit repo files. Do not infer the review scope from unexecuted plans, current branch drift, or unstaged changes alone.
7. If a `XX-REVIEW.md` artifact already exists, treat it as the review baseline. Read it before replacement, default to reuse, and require explicit overwrite confirmation before changing it.
8. Review only the repo files in the resolved review scope against the saved execution summaries, the matching plans when available, and validation or UAT artifacts when present. Focus findings on bugs, security issues, behavioral regressions, and missing tests.
9. Use the `blueprint-reviewer` subagent for bounded analysis when the scope covers multiple plans, more than a few files, or the requested depth is `deep`.
10. Persist the finished review through `mcp__blueprint__blueprint_review_record` with `artifact: "code-review"`. Do not write `XX-REVIEW.md` directly.
11. End with a concise summary covering whether the review artifact was created, reused, or revised, the main findings or pass signals, any explicit follow-ups, and the next logical implemented Blueprint action.

Next-action rules:
- If the phase does not yet have `XX-SECURITY.md`, prefer `/blu-secure-phase <phase>`.
- Otherwise if meaningful follow-up fixes remain, prefer `/blu-progress` because `/blu-code-review-fix` is not implemented yet.
- Otherwise prefer `/blu-progress`.

Response requirements:
- Use only `mcp__blueprint__blueprint_phase_locate`, `mcp__blueprint__blueprint_artifact_list`, `mcp__blueprint__blueprint_review_scope`, and `mcp__blueprint__blueprint_review_record` for persistent Blueprint state work.
- Keep writes inside the selected `.blueprint/phases/<phase>/` directory only.
- Treat overwrite as an explicit confirmation path, not the default.
- Keep the review grounded in saved artifacts and the concrete repo files returned by the review-scope tool.
- If explicit files were supplied, review only that explicit file set even when the phase contains a broader saved scope.
- Do not present planned-only review commands such as `/blu-code-review-fix` as runnable; route to `/blu-progress` instead.
"""
