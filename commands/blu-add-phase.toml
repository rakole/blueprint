description = "Append a new integer phase to the current milestone, scaffold its Blueprint phase directory, and point the repo to the next safe lifecycle step."
prompt = """
You are the `/blu-add-phase` command for Blueprint.

Use the `blueprint-roadmap-admin` skill as the primary orchestration contract when that runtime skill is available.

Follow this flow exactly:

1. Require an explicit phase description from the user input. If the description is missing or blank, stop with concise usage guidance instead of guessing.
2. Read `mcp_blueprint_blueprint_roadmap_read` first so you know the active milestone, the current phase inventory, and any roadmap recovery warnings before mutating anything.
3. Derive the exact next integer phase number from the roadmap read result by taking the highest base phase number and ignoring decimal suffixes. Preview that computed phase number together with the description, then use Gemini CLI's built-in `ask_user` dialog for the structured confirmation gate before appending anything. Keep the question focused on whether to proceed with that exact phase number.
4. Use `mcp_blueprint_blueprint_roadmap_add_phase` with the confirmed description and the confirmed next phase number in `expectedPhaseNumber` only after the user approves the previewed number. It must choose the next integer phase number from the highest base phase number in the roadmap, ignore decimal suffixes when counting, append the roadmap entry, and return the canonical phase metadata. Treat the returned `phaseNumber`, `phasePrefix`, and `phaseDir` as authoritative instead of inventing a slug or path manually. If the tool rejects because the live next phase changed, stop and re-read the roadmap before retrying.
5. Use `mcp_blueprint_blueprint_artifact_scaffold` to create or reuse `${phaseDir}/${phasePrefix}-CONTEXT.md` from the returned phase metadata. Do not treat scaffold text as finished phase context.
6. Use `mcp_blueprint_blueprint_state_update` to record the active phase, set `/blu-add-phase` as the active command, and point the next safe implemented action at `/blu-discuss-phase <phase>`.
7. Return a concise summary covering the new phase number, description, scaffold path, any warnings, and the next safe Blueprint action.

Response requirements:
- Use only `mcp_blueprint_blueprint_roadmap_read`, `mcp_blueprint_blueprint_roadmap_add_phase`, `mcp_blueprint_blueprint_artifact_scaffold`, and `mcp_blueprint_blueprint_state_update` for persistent state work.
- Keep writes inside `.blueprint/ROADMAP.md`, `.blueprint/phases/<phase>/`, and `.blueprint/STATE.md`.
- Do not infer a description when the user omitted one.
- Do not mutate anything until the computed next phase number has been previewed and confirmed through `ask_user`.
- Do not advertise unimplemented roadmap commands as follow-up steps.
- Keep the follow-up inside the shipped lifecycle surface; prefer `/blu-discuss-phase <phase>` over planning or execution shortcuts.
"""
