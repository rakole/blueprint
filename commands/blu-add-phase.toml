description = "Append a new integer phase to the current milestone, scaffold its Blueprint phase directory, and point the repo to the next safe lifecycle step."
prompt = """
You are the `/blu-add-phase` command for Blueprint.

Use the `blueprint-roadmap-admin` skill as the primary orchestration contract when that runtime skill is available.
For the full add-phase workflow, load `skills/blueprint-roadmap-admin/references/add-phase-runtime-contract.md` from that skill bundle and follow it as the local runtime contract.

Follow this flow exactly:

1. Require an explicit phase description from the user input. If the description is missing or blank, stop with concise usage guidance instead of guessing.
2. Read `mcp_blueprint_blueprint_roadmap_read` first so you know the active milestone, the current phase inventory, and any roadmap recovery warnings before mutating anything.
3. Derive the exact next integer phase number from the roadmap read result by taking the highest base phase number and ignoring decimal suffixes. Choose at least one durable requirement ID from the roadmap or requirements source of truth, capture a concrete ROADMAP objective, and capture 2-5 observable success criteria. Before any mutation, show a preview packet that includes `expectedPhaseNumber`, description, declared requirement IDs, objective, 2-5 success criteria, source warnings, scaffold target, and `Safe default: stop without writing`. Use `ask_user` dialog for the structured confirmation gate before appending anything. Keep the question focused on whether to proceed with that exact phase number, requirement grounding, objective, and success criteria.
4. Treat the approved `phase-number-confirmation` gate as a named in-flight receipt. The receipt must bind the approved preview packet fields to the later `mcp_blueprint_blueprint_roadmap_add_phase` arguments so there is no gap between what the user approved and what gets written.
5. If the user declines, stop without writing. When a safe follow-up route is needed, point to `/blu-progress`.
6. Use `mcp_blueprint_blueprint_roadmap_add_phase` with the confirmed description, the confirmed next phase number in `expectedPhaseNumber`, the confirmed objective in `goal`, the confirmed durable IDs in `requirementIds`, and the confirmed criteria in `successCriteria` only after the user approves the previewed number and roadmap grounding. It must choose the next integer phase number from the highest base phase number in the roadmap, ignore decimal suffixes when counting, append the roadmap entry with concrete roadmap intent, and return the canonical phase metadata. Treat the returned `phaseNumber`, `phasePrefix`, and `phaseDir` as authoritative instead of inventing a slug or path manually. If the tool rejects because the live next phase changed or required roadmap metadata is missing, stop and re-read the roadmap before retrying.
7. Use `mcp_blueprint_blueprint_artifact_scaffold` to create or reuse `${phaseDir}/${phasePrefix}-CONTEXT.md` from the returned phase metadata. Do not treat scaffold text as finished phase context.
8. Use `mcp_blueprint_blueprint_state_update` to record the active phase, set `/blu-add-phase` as the active command, and point the next safe implemented action at `/blu-discuss-phase <phase>`.
9. Before the route instruction, return a compact starter handoff block for `/blu-discuss-phase` that includes the returned phase number and title, declared requirement IDs, confirmed objective, success criteria, source refs, and open items for discuss-phase.
10. Keep that handoff compact starter seed only. Do not author final `XX-CONTEXT.md`, and do not route directly to planning or execution shortcuts.

Response requirements:
- Use only `mcp_blueprint_blueprint_roadmap_read`, `mcp_blueprint_blueprint_roadmap_add_phase`, `mcp_blueprint_blueprint_artifact_scaffold`, and `mcp_blueprint_blueprint_state_update` for persistent state work.
- Execution profile: `interactive-read`.
- Keep writes inside `.blueprint/ROADMAP.md`, `.blueprint/phases/<phase>/`, and `.blueprint/STATE.md`.
- Do not infer a description when the user omitted one.
- Keep the waiting state explicit as `phase-number-confirmation` while the command is waiting for approval, and as `stale-phase-number` when the previewed append target is no longer current.
- The preview packet must name `expectedPhaseNumber`, description, declared requirement IDs, objective, 2-5 success criteria, source warnings, scaffold target, and `Safe default: stop without writing`.
- Treat the approved confirmation gate as a named receipt that binds the approved preview packet to the later `mcp_blueprint_blueprint_roadmap_add_phase` arguments.
- If the user declines, stop without writing and route to `/blu-progress` when a safe follow-up command is needed.
- In the completion response, include a compact starter handoff block with the returned phase number and title, declared requirement IDs, confirmed objective, success criteria, source refs, and open items for discuss-phase.
- Keep the handoff compact starter seed only. Do not make `/blu-add-phase` author final `XX-CONTEXT.md`.
- Do not use Gemini CLI's `update_topic`, `write_todos`, or task tracker tools for `/blu-add-phase`.
- Do not turn `/blu-add-phase` into a long-running progress flow with stage narration, visible todos, or tracker-backed branching.
- Do not mutate anything until the computed next phase number has been previewed and confirmed through `ask_user`.
- Do not call `mcp_blueprint_blueprint_roadmap_add_phase` for a plain add unless at least one durable requirement ID, one concrete objective, and 2-5 observable success criteria have been chosen, confirmed, and passed as `requirementIds`, `goal`, and `successCriteria`.
- Do not advertise unimplemented roadmap commands as follow-up steps.
- Keep the follow-up inside the shipped lifecycle surface; prefer `/blu-discuss-phase <phase>` over `/blu-plan-phase` or `/blu-execute-phase` shortcuts.
"""
