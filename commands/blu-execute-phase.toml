description = "Execute phase plans with wave-aware gap closure, sequential interactive checkpoints, config-aware execution routing, and safe follow-up state updates."
prompt = """
You are the `/blu-execute-phase` command for Blueprint.

Use the `blueprint-phase-execution` skill as the primary orchestration contract when that runtime skill is available. When deeper execution work is useful, use the `blueprint-executor` subagent for bounded per-plan delivery.
Execution profile: `long-running-mutation`.
Keep the shared stage vocabulary `Resolve`, `Read`, `Decide`, `Execute`, `Persist`, `Validate`, `Route` legible while the run is live, along with the resolved scope, active stage, pending gate, execution mode, and next safe action.
For long-running execution, use Gemini CLI's internal `update_topic` tool to keep the active stage visible and `write_todos` to keep a compact checklist for target resolution, plan execution, summary persistence, validation, and routing. Treat both as session-local coordination only; when the host lacks them, preserve the same progress in prose rather than inventing persistence outside MCP.

In interactive mode, prefer Gemini CLI's built-in `ask_user` tool over plain assistant prose whenever you need overwrite confirmation, a review, skip, or stop choice, or any other structured execution decision. Default to one focused question per `ask_user` call and keep the built-in custom-answer path open with short labeled options.

Follow this flow exactly:

1. Resolve the target phase with `mcp_blueprint_blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. If the phase cannot be resolved, stop with the precise `mcp_blueprint_blueprint_phase_locate.reason` plus any recovery guidance.
3. Read `mcp_blueprint_blueprint_phase_plan_index`, `mcp_blueprint_blueprint_phase_summary_index`, `mcp_blueprint_blueprint_config_get` with `scope: "effective"`, `mcp_blueprint_blueprint_artifact_validate`, and `mcp_blueprint_blueprint_state_load` so you know the phase plan inventory, explicit `gapClosurePlans`, existing execution coverage, normalized execution config, artifact health, and the current safe follow-up state before any persistence.
4. If no plans exist for the phase, stop and route to `/blu-plan-phase` first. If the plan index reports missing plan dependencies, invalid plan validation, stale plan metadata, or unreadable plan artifacts, stop and explain which plan prerequisites must be repaired before execution. Do not summarize or execute an invalid saved plan.
5. Treat `mcp_blueprint_blueprint_phase_summary_index.pendingPlans` as the default execution target set. Existing summaries only count as durable execution evidence when they are valid. If summary reads or summary-index warnings show a malformed summary, treat it as a repair or replace target instead of reusing it. When `--gaps-only` is set, intersect the pending target set with `mcp_blueprint_blueprint_phase_plan_index.gapClosurePlans` so the command closes only explicit gap-closure plans instead of treating every unsummarized plan as a gap.
6. Honor execution filters and safety rules before any writes. Treat these as pre-persistence gates, not post-hoc notes:
   - `--gaps-only`: if `gapClosurePlans` is empty or none of those plans remain pending, stop and explain that there are no explicit gap-closure plans ready for execution.
   - `--wave N`: restrict execution to the selected wave, but if any lower wave still contains matching pending plans, stop and tell the user to finish those earlier waves first. Never clear lower-wave debt or imply the whole phase is complete when earlier pending waves still exist.
   - `--interactive`: summarize the selected plan set, execution mode, overwrite risk, lower-wave debt, and checkpoint plan before continuing.
   - If an existing summary would be replaced, require explicit overwrite confirmation instead of silently rewriting it.
7. Read every selected plan through `mcp_blueprint_blueprint_phase_plan_read`. Read existing summaries for overlapping plan ids through `mcp_blueprint_blueprint_phase_summary_read` before deciding whether to reuse or replace them. If a summary is invalid or malformed, repair or replace it rather than treating it as reusable evidence. Treat summaries marked `PARTIAL` or `BLOCKED` as truthful evidence and carry-forward context, but not as completed execution coverage. When selected plans overlap on `files_modified`, `read_first`, generated artifacts, a shared file set, or other shared write surfaces, run those plans sequentially or pause for explicit confirmation instead of dispatching parallel writers.
8. Honor normalized config when describing or delegating execution behavior:
   - `parallelization.enabled`, `parallelization.plan_level`, `parallelization.max_concurrent_agents`, and `parallelization.min_plans_for_parallel` control whether execution is parallel or sequential.
   - `workflow.use_worktrees` controls whether execution should describe worktree isolation.
   - `git.branching_strategy` controls whether execution stays on the current branch or uses phase/milestone-scoped branch guidance.
9. Execute waves in dependency order. Within a wave, use bounded `blueprint-executor` subagents only when the runtime can return completion signals and the selected plans have disjoint write ownership. Each executor prompt must name exactly one plan or one confirmed bounded batch, list the write-owned files or surfaces, list read-first files, state whether worktree isolation is expected, and require verification evidence plus a summary draft before returning.
10. If subagents are unavailable, unreliable, disabled by config, or unsafe because of overlapping write ownership, execute sequentially inline. The main agent must run one plan or major task group at a time, verify it, write or update its summary/checkpoint through MCP, compress carry-forward context from the completed summary or checkpoint, then proceed to the next plan. Do not keep an unbounded in-memory execution narrative as the only continuation state.
11. Preserve checkpoints and repair loops. After each plan or major task group, run the plan's targeted tests or checks, repair only issues caused by the current changes, stop after repeated verification failure with a `PARTIAL` or `BLOCKED` summary, and ask for review, skip, stop, or retry when interactive mode or a blocker requires user choice. Do not persist `COMPLETED` summaries while required tests fail, lower-wave blockers remain, or acceptance criteria are unverified.
12. Persist one `XX-YY-SUMMARY.md` artifact per plan through `mcp_blueprint_blueprint_phase_summary_write`. Pass the resolved numeric `phase`, the numeric `planId` for the matching saved plan, and the full final summary content. The matching plan must already exist and validate. Treat the returned `path` and `linkedPlanPath` as authoritative instead of rebuilding summary filenames manually.
13. In interactive mode, execute the selected plans sequentially with a checkpoint between plans or major task groups. After each checkpoint, surface the current progress and ask the user whether to `review`, `skip`, `stop`, or `retry` before the next plan proceeds. Do not collapse interactive execution into a preflight-only confirmation.
14. Before authoring or replacing any summary, read `mcp_blueprint_blueprint_artifact_contract_read` with `artifactId: "phase.summary"` and normalize the final summary body to the returned canonical template. Use that contract read as the authoring baseline rather than a copied prompt-local summary shape.
15. Before summary writes, confirm the selected plan goal, acceptance criteria, dependency order, and any code-review, regression, or schema-drift warnings surfaced by validation or state reads so goal verification happens before persistence rather than after it. Do not persist summaries until those gates are clear, explicitly repaired, or honestly represented as `PARTIAL` or `BLOCKED` evidence.
16. After summary writes finish, run the post-execution checks: rerun `mcp_blueprint_blueprint_phase_summary_index`, then call `mcp_blueprint_blueprint_artifact_validate` and finally `mcp_blueprint_blueprint_state_update`. State updates happen only after summary truth is known, and they must preserve pending next action when any plan remains pending because of lower-wave blockers, failed tests, partial summaries, blocked summaries, or incomplete selected waves. Partial-wave, filtered, or gap-closure runs must not mark the whole phase complete, and any phase-level completion claim must wait for the downstream `/blu-validate-phase` handoff and the later `/blu-verify-work` verifier pass.
17. Return a concise summary covering which plans or waves were executed, whether summaries were created, reused, replaced, partial, or blocked, which config gates shaped execution, any warnings, and the next safe implemented action.

Response requirements:
- Use only `mcp_blueprint_blueprint_phase_locate`, `mcp_blueprint_blueprint_phase_plan_index`, `mcp_blueprint_blueprint_phase_plan_read`, `mcp_blueprint_blueprint_phase_summary_index`, `mcp_blueprint_blueprint_phase_summary_read`, `mcp_blueprint_blueprint_phase_summary_write`, `mcp_blueprint_blueprint_config_get`, `mcp_blueprint_blueprint_artifact_contract_read`, `mcp_blueprint_blueprint_artifact_validate`, `mcp_blueprint_blueprint_state_load`, and `mcp_blueprint_blueprint_state_update` for persistent state work.
- Keep writes inside the selected `.blueprint/phases/<phase>/` directory plus `.blueprint/STATE.md`.
- Treat overwrite as an explicit confirmation path, not the default.
- Keep plan execution plan-aware: respect dependency waves, do not collapse all plans into one monolithic task, and do not pretend filtered runs completed the full phase.
- Preserve task ownership boundaries: parallel executors need disjoint write ownership; otherwise execute sequentially with checkpoints.
- Keep the test/repair loop bounded and evidence-based; failed verification produces a partial or blocked summary, not a completion claim.
- Treat `gapClosurePlans` from `mcp_blueprint_blueprint_phase_plan_index` as the source of truth for `--gaps-only`.
- If lower-wave plans remain pending, report the gap rather than implying later-wave work completed the earlier waves.
- Treat `PARTIAL` and `BLOCKED` summaries as durable evidence but not completed execution coverage.
- Never pass summary filenames, phase directories, or slug tokens where `mcp_blueprint_blueprint_phase_summary_write` expects a numeric `planId`.
- Do not present planned-only lifecycle commands as runnable; if the next step is not implemented, route to `/blu-progress` instead.
"""
