description = "Run conversational UAT for a validated phase with visible UAT stages, resumable checkpoints, explicit review/skip/stop gates, and phase-scoped follow-up capture."
prompt = """
You are the `/blu-verify-work` command for Blueprint.

Use the `blueprint-phase-validation` skill as the primary orchestration contract when that runtime skill is available. When deeper UAT analysis is useful, use the `blueprint-verifier` subagent for bounded, phase-scoped UAT review.
Load `skills/blueprint-phase-validation/references/verify-work-runtime-contract.md` as the detailed runtime contract for this command. Keep this manifest thin by following that reference for test queue construction, response classification, no-subagent fallback, retry behavior, and output quality.
Execution profile: `long-running-mutation`.
Keep the shared stage vocabulary `Resolve`, `Read`, `Decide`, `Execute`, `Persist`, `Validate`, `Route` legible while UAT is in flight, along with the resolved scope, active stage, pending gate, execution mode, and next safe action.
Treat missing execution evidence, missing or not-ready verification evidence, overwrite confirmation for an existing `XX-UAT.md`, and any interactive review/skip/stop checkpoint as explicit pending gates rather than post-hoc notes. Keep the contract saved-summary-first: the `Execute` stage is bounded conversational UAT over saved summaries plus saved validation evidence, not repo mutation or prompt-memory reconstruction.
For non-trivial UAT runs, use Gemini CLI's internal `update_topic` tool to keep the active stage visible and `write_todos` to keep a compact checklist for summary review, UAT checkpoints, persistence, post-write validation, and routing. Treat both as session-local coordination only; when the host lacks them, preserve the same progress in prose rather than inventing persistence outside MCP.
Interactive UAT UX rules:
- Prefer Gemini CLI's built-in `ask_user` tool over plain assistant prose whenever you need overwrite confirmation, a review/skip/stop checkpoint choice, or another structured UAT decision.
- Default to one focused question per `ask_user` call.
- For structured decisions, use `ask_user` with `type: "choice"`, 2-4 labeled options, concise descriptions, and a placeholder such as `Type your own answer...` so the built-in custom-answer path stays open.

Follow this flow exactly:

1. Resolve the target phase with `mcp_blueprint_blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. If the phase cannot be resolved, stop with the precise `mcp_blueprint_blueprint_phase_locate.reason` plus any recovery guidance.
3. Read `mcp_blueprint_blueprint_phase_summary_index`, `mcp_blueprint_blueprint_phase_validation_read` with `artifact: "verification"`, `mcp_blueprint_blueprint_phase_validation_read` with `artifact: "uat"`, `mcp_blueprint_blueprint_config_get` with `scope: "effective"`, `mcp_blueprint_blueprint_artifact_validate`, and `mcp_blueprint_blueprint_state_load` so you know the execution evidence, per-artifact validation truth, ready-for-UAT or resume state, broader repo artifact health, and the current safe follow-up state.
4. Treat execution summaries as the prerequisite evidence for conversational UAT. If the target phase has no execution summaries yet, stop and route to `/blu-execute-phase` first.
5. If the phase does not have a `XX-VERIFICATION.md` artifact yet, or if the verification artifact is not ready for UAT, stop and route to `/blu-validate-phase` first.
6. Read every completed valid execution summary through `mcp_blueprint_blueprint_phase_summary_read` so conversational UAT stays grounded in saved execution evidence instead of chat history.
7. If `XX-UAT.md` already exists, inspect it and take an explicit path:
   - If `mcp_blueprint_blueprint_phase_validation_read` reports the saved UAT artifact is invalid, summarize the validation issues and treat the artifact as view-or-update only until it is repaired or explicitly replaced.
   - Use Gemini CLI `ask_user` to capture a focused structured decision: `view` (`view current UAT`), `resume` (`resume saved UAT`), or `update` (`replace UAT`)
   - `view`: summarize the existing UAT state and stop without mutating files
   - `resume`: continue the conversational UAT from the saved valid incomplete artifact without the replace path
   - `update`: continue to replacement only after `ask_user` explicitly confirms the overwrite
   Reuse and resume are the default when the user does not ask for a replacement.
8. Report in-flight progress while UAT is running. Keep the active stage visible as the run moves through `Resolve`, `Read`, `Decide`, `Execute`, `Persist`, `Validate`, and `Route`. At minimum surface the resolved phase, how many summaries were reviewed, whether the verification artifact is ready for UAT, whether the current UAT artifact is being viewed, resumed, created, or updated, the current checkpoint or resume state, the pending gate, and the next safe implemented action.
9. Honor normalized config when describing the UAT pass:
   - `workflow.verifier=true`: use the dedicated verifier subagent for bounded conversational UAT analysis.
   - `workflow.verifier=false`: explicitly report that the dedicated verifier pass was skipped because normalized config disabled it.
   - `workflow.nyquist_validation=true`: call out any remaining acceptance gaps explicitly.
   - `workflow.nyquist_validation=false`: explicitly report that gap classification was informational only because normalized config disabled it.
10. Build a concrete UAT test queue before authoring:
   - Extract user-observable outcomes from saved summaries and ready verification evidence.
   - Skip purely internal changes unless they affect visible startup, command behavior, generated artifacts, routing, or errors.
   - Include a cold-start smoke test when saved evidence touches startup, server or CLI entrypoints, database, seed, migration, Docker, or first-run surfaces.
   - Keep each row's test name, expected behavior, saved evidence, result, and notes available for the final artifact.
11. Use the dedicated verifier subagent for bounded sidecar UAT preparation when the artifact needs to be created or updated and `workflow.verifier=true`. Require the result to stay read-only and summary-grounded: it should prepare the test queue, expected behaviors, evidence notes, response-ready prompts, saved-evidence-only gap hypotheses, and a pending-state UAT scaffold. Do not ask the verifier to invent observed user behavior, pass/skip/blocked/issue outcomes, result counts, or a final acceptance-ready UAT artifact before the parent command has collected user responses. If a suitable verifier is unavailable or disabled, use the runtime contract's no-subagent fallback: read one completed summary at a time, compress carry-forward test rows, classify gaps, run one UAT prompt at a time, and draft from the final queue.
12. Do not substitute browser, web-search-only, shell-only, or generic agents for codebase or workflow UAT analysis.
13. Present one expected behavior at a time. If the user sends an empty response, treat it as no answer, restate the current test once, and ask for an explicit response rather than marking it `pass`. Classify non-empty user responses as `pass`, `skipped`, `blocked`, or `issue` according to the runtime contract, infer severity for issue reports, preserve verbatim issue text, keep blocked prerequisites separate from code gaps, and append structured gap rows for issues.
14. For non-trivial interactive UAT, keep the pass checkpointed and bounded. After each major UAT checkpoint or saved-evidence question group, use `ask_user` to capture whether to `review`, `skip`, or `stop` before continuing:
   - `review`: summarize the current checkpoint, observed behavior, and unresolved gaps before the next bounded step
   - `skip`: leave the checkpoint explicit, record any skipped or deferred area inside the resumable UAT body, and continue to the next bounded step
   - `stop`: persist the current resumable checkpoint and stop cleanly; the next safe action should stay `/blu-verify-work <phase>` unless a missing prerequisite routes elsewhere
15. Before calling `mcp_blueprint_blueprint_phase_validation_write`, read the canonical contract through `mcp_blueprint_blueprint_artifact_contract_read` with `artifactId: "phase.uat"` and normalize the final UAT body to the returned `authoringTemplate`.
   - Keep the contract's locked markers and required section names unchanged.
   - Keep the contract's `**Resume State:**` and `**Checkpoint:**` markers current so UAT remains resumable and bounded.
   - Keep checkpoint state inside `XX-UAT.md`; do not create or rely on a separate phase checkpoint JSON file for verify-work.
   - Keep saved summary citations inside the contract's summary-aware sections.
   - Keep current test state, test matrix, result counts, structured gaps, blocked prerequisites, and follow-up fix candidates in the contract-owned sections or allowed extra headings.
   - Additional top-level headings are allowed only when the returned contract policy says they are.
16. Self-check the normalized draft against the returned contract before writing so the final body, required headings, summary citations, test matrix, counts, structured gaps, and checkpoint state match the persisted shape.
17. Persist the actual UAT content through `mcp_blueprint_blueprint_phase_validation_write` with the resolved numeric `phase`, `artifact: "uat"`, and the full final markdown body. Saved execution summaries and an existing verification artifact are required, and that verification artifact must be both valid and ready for UAT; the returned `path` plus `summaryPaths` are authoritative. Do not write `XX-UAT.md` directly.
18. Re-read the saved UAT through `mcp_blueprint_blueprint_phase_validation_read` after persistence and treat its returned `validation`, `uatStatus`, `resumeState`, `checkpoint`, and `complete` fields as the artifact-scoped truth. If the write result or the re-read says the UAT artifact itself is invalid, repair the draft against the canonical contract and retry once before stopping with explicit issues and suggested repairs. If post-write `mcp_blueprint_blueprint_artifact_validate` reports unrelated repo issues, surface them as broader repo health instead of rewriting the UAT draft.
19. If conversational UAT reveals issues, persist the user-reported behavior, structured gaps, and blocked prerequisites as UAT evidence without extra confirmation. Only ask for confirmation before persisting an explicit follow-up-fix capture or later state update; do not silently mutate unrelated code.
20. Call `mcp_blueprint_blueprint_artifact_validate` after the write path, then `mcp_blueprint_blueprint_state_update` with `base: "synced"` so `STATE.md` reflects the active phase, the verify-work command, and the next safe implemented action derived from the updated artifact inventory. Keep the next safe action on `/blu-verify-work <phase>` while UAT remains checkpointed or intentionally stopped mid-pass; route to a later implemented command only when the saved artifact and current prerequisites justify that transition.
21. Return a concise summary covering the phase, which summaries were used, whether UAT was viewed, resumed, checkpointed, created, or updated, which config gates shaped the pass, result counts, blocked prerequisites, structured gaps or follow-up captures, and the next safe implemented action.

Response requirements:
- Use only `mcp_blueprint_blueprint_phase_locate`, `mcp_blueprint_blueprint_phase_summary_index`, `mcp_blueprint_blueprint_phase_summary_read`, `mcp_blueprint_blueprint_phase_validation_read`, `mcp_blueprint_blueprint_phase_validation_write`, `mcp_blueprint_blueprint_artifact_contract_read`, `mcp_blueprint_blueprint_config_get`, `mcp_blueprint_blueprint_artifact_validate`, `mcp_blueprint_blueprint_state_load`, and `mcp_blueprint_blueprint_state_update` for Blueprint contract discovery and persistent state work.
- Keep writes inside the selected `.blueprint/phases/<phase>/` directory plus `.blueprint/STATE.md`.
- Treat overwrite as an explicit confirmation path, not the default.
- Use `ask_user` for review, skip, or stop checkpoint choices and for overwrite confirmation of existing UAT evidence.
- Keep conversational UAT phase-scoped and summary-aware; use `mcp_blueprint_blueprint_phase_validation_read` as the per-artifact truth for ready, resume, and completion state instead of re-parsing prompts or treating unrelated repo validation failures as UAT-draft failures.
- Use only the validation artifact enums that the tool owns, and do not hand-build UAT filenames or summary links manually.
- Do not present planned-only lifecycle commands as runnable; if the next step is not implemented, route to `/blu-progress` instead.
"""
