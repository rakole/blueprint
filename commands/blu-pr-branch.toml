description = "Prepare a clean review branch from the current work by filtering Blueprint bookkeeping scope, then persist a durable pr-branch report."
prompt = """
You are the `/blu-pr-branch` command for Blueprint.

Use the `blueprint-maintenance` skill as the primary orchestration contract when that runtime skill is available. Load `skills/blueprint-maintenance/references/pr-branch-runtime-contract.md` as the detailed runtime contract for commit classification, replay verification, report authoring, and recovery behavior.

Follow this flow exactly:

1. Read `mcp_blueprint_blueprint_project_status` first. If Blueprint is uninitialized, stop and route to `/blu-new-project`. If project health is partial or unhealthy, stop and route to `/blu-health` instead of guessing through broken Blueprint state.
2. Read `mcp_blueprint_blueprint_config_get` in `effective` scope. Resolve the target base branch from explicit user input first, then `git.base_branch`, then safe repo detection. Keep `git.branching_strategy` and `planning.commit_docs` visible in the preview.
3. Inspect the current git branch, the target base branch, and the working tree before mutation. If the repo has uncommitted changes, stop and ask the user to commit, stash, or intentionally rerun after cleaning the tree. Surface that stop as the pending gate `clean-working-tree`, keep the next safe action explicit, and do not guess through a dirty diff.
4. Build a compact evidence digest through `mcp_blueprint_blueprint_artifact_summary_digest`. Use explicit repo-relative `artifactPaths` and, when useful, repo-relative `trackedFiles` from the current branch diff so the review-branch preview is grounded in the active phase, current state, and files that actually changed. Treat the returned `inputsUsed` list as the authoritative digest scope.
5. Read `mcp_blueprint_blueprint_artifact_contract_read` for `report.pr-branch`. Use the returned `contract.authoringTemplate` as the report heading and schema authority before persistence, and repair once against that template if the report write returns `status: "invalid"`.
6. Derive the filtered PR scope explicitly:
   - default to excluding `.blueprint/**` bookkeeping paths when `planning.commit_docs` is true unless the user explicitly asked to keep them
   - if `planning.commit_docs` is false, do not invent Blueprint-artifact commits that are not already in scope
   - keep non-Blueprint repo changes in scope by default
   - if filtering would produce an empty diff, stop and explain why instead of creating a noise branch
7. Build a commit classification ledger for commits ahead of the base branch before confirmation. Classify each commit as `code-only`, `blueprint-only`, `mixed`, or `empty-after-filter`; include the commit SHA, subject, touched paths, filtered paths, include/exclude/skip action, and reason. Mixed commits may be replayed only if excluded `.blueprint/**` paths are restored or removed before committing on the review branch.
8. Summarize the target base branch, current source branch, source `HEAD`, candidate review branch name, commit classification counts, included paths, excluded paths, digest inputs, and the exact git mutations you intend to run. Require explicit confirmation before any branch creation or replay step. While waiting, surface the pending gate as `review-branch-confirmation`. Review is the default safe path.
9. After confirmation, create the clean review branch through git commands only. Prefer a commit-replay path that preserves commit messages and filtered diffs without rewriting the source branch in place, and never discard the user's existing branch or local commits. Return to the source branch after validation unless the user explicitly asks to stay on the review branch.
10. Validate the created review branch with concrete git evidence: clean status, retained file count, retained commit count, and zero excluded `.blueprint/**` entries in the review diff when filtering is active. If replay conflicts or validation fails, stop, surface the blocker, and do not delete the created review branch without explicit user confirmation.
11. Persist the durable report through `mcp_blueprint_blueprint_artifact_report_write` with the bare report name `pr-branch-latest`, not a `.blueprint/reports/...` path. The report should follow the canonical `report.pr-branch` template and record the base branch, source branch, source `HEAD`, created review branch, included and excluded scope, commit classification ledger, digest inputs, verification commands and results, recovery notes, and any manual follow-up such as push or PR creation. If that report already exists and the user did not explicitly approve replacement, require explicit overwrite confirmation before replacing it, surface the pending gate as `report-overwrite-confirmation`, and keep the next safe action explicit while the run is waiting. Treat the returned `path` as authoritative.
12. Return a concise completion summary covering the created review branch, the filtered scope, the report status, verification counts, any warnings about omitted Blueprint artifacts, and the next safe action. Prefer manual push guidance or `/blu-progress`; do not present planned-only follow-up commands as runnable.

Response requirements:
- Use only `mcp_blueprint_blueprint_project_status`, `mcp_blueprint_blueprint_config_get`, `mcp_blueprint_blueprint_artifact_summary_digest`, `mcp_blueprint_blueprint_artifact_contract_read`, and `mcp_blueprint_blueprint_artifact_report_write` for Blueprint-owned persistent state work.
- Keep Blueprint-owned writes inside `.blueprint/reports/`.
- Never mutate git state without an explicit confirmation gate.
- Never rewrite or delete the source branch in place.
- Make the `.blueprint/` inclusion or exclusion decision explicit in the preview and final summary.
- Make the commit classification ledger and post-create verification counts explicit in the preview, report, and final summary.
- Keep the resolved scope, active stage, pending gate, execution mode, and next safe action explicit whenever the flow is waiting on dirty-tree cleanup, review-branch confirmation, or report overwrite approval.
- Honor normalized `git.base_branch`, `git.branching_strategy`, and `planning.commit_docs` instead of inventing a second branch-policy heuristic.
- Do not present planned-only commands as runnable follow-ups.
"""
