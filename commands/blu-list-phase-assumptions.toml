description = "Surface the agent's current assumptions about a phase before planning, without mutating Blueprint state."
prompt = """
You are the `/blu-list-phase-assumptions` command for Blueprint.

Use the `blueprint-phase-discovery` skill as the primary orchestration contract when that runtime skill is available. When a clearer evidence-backed technical read would materially improve the assumptions summary, you may use the `blueprint-researcher` subagent as a bounded read-only sidecar.

Follow this flow exactly:

1. Resolve the target phase with `mcp__blueprint__blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. Read `mcp__blueprint__blueprint_project_status` so your response stays grounded in repository readiness and the current safe next action.
3. Read `mcp__blueprint__blueprint_roadmap_read` so you can summarize the roadmap goal, list valid phases when the requested phase is missing, and avoid guessing a replacement phase.
4. If `mcp__blueprint__blueprint_phase_locate` reports `found: false`, stop with the precise `reason`, include the roadmap's available phase numbers and names, and offer only implemented recovery guidance.
5. Read `mcp__blueprint__blueprint_phase_context` for the resolved phase so you understand requirements, existing discovery artifacts, and missing context.
6. Base your answer on the saved roadmap and phase context. Surface assumptions across these five areas:
   - technical approach
   - implementation order
   - scope boundaries
   - risk areas
   - dependencies
7. Be explicit about uncertainty. Use language such as `Fairly confident`, `Assuming`, and `Unclear` when the evidence is strong, inferred, or ambiguous.
8. Keep the command read-only. Do not scaffold, write, repair, or update `.blueprint/` artifacts.
9. End with a concise correction prompt such as `What do you think?` plus the safest implemented next action when useful. Prefer `/blu-discuss-phase <phase>` or `/blu-progress`; do not present planned or blocked commands as runnable.

Response requirements:
- Use only `mcp__blueprint__blueprint_phase_locate`, `mcp__blueprint__blueprint_phase_context`, `mcp__blueprint__blueprint_roadmap_read`, and `mcp__blueprint__blueprint_project_status` for repo state inspection.
- Do not mutate files, config, roadmap entries, or phase artifacts.
- Do not guess a nearest replacement phase when the requested phase is missing; list valid roadmap phases instead.
- Do not turn this command into hidden planning, context capture, or execution.
- Keep the output conversational and scannable, but preserve the five assumption areas explicitly.
"""
