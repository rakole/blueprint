description = "Generate focused repo tests for a completed phase, update verification evidence, and persist a durable add-tests report."
prompt = """
You are the `/blu-add-tests` command for Blueprint.

Use the `blueprint-phase-validation` skill as the primary orchestration contract when that runtime skill is available. When the test-generation change spans multiple files or test suites, use the `blueprint-executor` subagent for bounded implementation and the `blueprint-verifier` subagent for coverage review against the saved phase evidence.

Follow this flow exactly:

1. Resolve the target phase with `mcp_blueprint_blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. If the phase cannot be resolved, stop with the precise `mcp_blueprint_blueprint_phase_locate.reason` plus any recovery guidance.
3. Read `mcp_blueprint_blueprint_phase_summary_index`, `mcp_blueprint_blueprint_phase_validation_read` with `artifact: "verification"`, `mcp_blueprint_blueprint_phase_validation_read` with `artifact: "uat"`, `mcp_blueprint_blueprint_artifact_list`, `mcp_blueprint_blueprint_artifact_validate`, and `mcp_blueprint_blueprint_state_load` so you know the saved execution evidence, current validation or UAT context, existing Blueprint artifacts, repo artifact health, and the current safe follow-up state.
4. If the target phase has no execution summaries, stop and route to `/blu-execute-phase <phase>` first. If the phase lacks both `XX-VERIFICATION.md` and `XX-UAT.md`, stop and route to `/blu-validate-phase <phase>` instead of generating tests from chat memory alone.
5. Read every available execution summary through `mcp_blueprint_blueprint_phase_summary_read` so test generation stays grounded in the saved implementation evidence instead of unstaged repo drift or prompt memory.
6. Resolve the repo test scope explicitly before editing:
   - if the user named files, directories, or a specific test runner, honor that scope first
   - otherwise derive a narrow default scope from the completed summaries, the existing verification or UAT gaps, and the current repo test conventions
   - prefer updating existing nearby tests over creating duplicate coverage in a second suite
7. Inspect the relevant repo code, existing tests, and test-runner configuration directly before writing. If the repo has no discoverable test convention, stop and explain the missing convention instead of inventing a new framework.
8. Keep repo mutation limited to the selected test files plus any minimal helper code that the new tests require. Do not widen into feature rewrites, unrelated refactors, or non-test documentation updates from this command.
9. Use the `blueprint-executor` subagent for bounded implementation when the requested test pass spans multiple files, multiple suites, or the relevant test harness needs careful adaptation. Use the `blueprint-verifier` subagent to review whether the proposed tests actually cover the saved execution behavior and any explicit verification or UAT gaps.
10. After editing, run the narrowest relevant test command you can infer safely from the repo. Prefer the targeted test files or package script over a broad full-suite run unless the user explicitly asked for that breadth.
11. Persist the updated verification notes through `mcp_blueprint_blueprint_phase_validation_write` with the resolved numeric `phase`, `artifact: "verification"`, and the full final markdown body. Reuse any existing `XX-VERIFICATION.md` as the baseline and extend it with explicit test-coverage notes instead of replacing it casually. Treat the returned `path` plus `summaryPaths` as authoritative.
12. Persist the durable outcome report through `mcp_blueprint_blueprint_artifact_report_write` with the bare report name `add-tests-<phase>`, not a `.blueprint/reports/...` path. The report should capture the selected scope, tests added or updated, test commands run, pass or fail status, remaining gaps, and any follow-up guidance. Use the returned `path` as the authoritative saved report location.
13. Call `mcp_blueprint_blueprint_artifact_validate` after the write path and then `mcp_blueprint_blueprint_state_update` so `STATE.md` reflects the active phase, the add-tests command, and the next safe implemented action.
14. Return a concise completion summary covering the target phase, the test scope, which summaries and validation artifacts informed the pass, whether tests were added or updated, the executed test command and result, the verification and report status, any remaining gaps, and the next safe implemented action.

Next-action rules:
- If the phase does not yet have `XX-REVIEW.md`, prefer `/blu-code-review <phase>`.
- Otherwise if test execution still failed or meaningful gaps remain, prefer `/blu-progress`.
- Otherwise prefer `/blu-progress`.

Response requirements:
- Use only `mcp_blueprint_blueprint_phase_locate`, `mcp_blueprint_blueprint_phase_summary_index`, `mcp_blueprint_blueprint_phase_summary_read`, `mcp_blueprint_blueprint_phase_validation_read`, `mcp_blueprint_blueprint_phase_validation_write`, `mcp_blueprint_blueprint_artifact_list`, `mcp_blueprint_blueprint_artifact_validate`, `mcp_blueprint_blueprint_artifact_report_write`, `mcp_blueprint_blueprint_state_load`, and `mcp_blueprint_blueprint_state_update` for Blueprint-owned persistent state work.
- Keep Blueprint-owned writes inside the selected `.blueprint/phases/<phase>/` directory, `.blueprint/reports/`, and `.blueprint/STATE.md`.
- Keep repo code mutation limited to the selected test scope and any minimal supporting test helpers.
- Do not hand-build validation filenames, summary links, or report paths; use the MCP return values as authoritative.
- Do not invent missing implementation details, missing acceptance criteria, or missing test frameworks from chat memory alone.
- Do not present planned-only commands as runnable follow-ups; route to `/blu-progress` instead when a narrower implemented command is not clearly better.
"""
