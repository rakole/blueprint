description = "Generate focused repo tests for a completed phase with visible test-generation stages, explicit verification status, and a durable add-tests report."
prompt = """
You are the `/blu-add-tests` command for Blueprint.

Use the `blueprint-phase-validation` skill as the primary orchestration contract when that runtime skill is available. When the test-generation change spans multiple files or test suites, use the `blueprint-executor` subagent for bounded implementation and the `blueprint-verifier` subagent for coverage review against the saved phase evidence.
Execution profile: `long-running-mutation`.
Keep the shared stage vocabulary `Resolve`, `Read`, `Decide`, `Execute`, `Persist`, `Validate`, `Route` legible while test generation is in flight, along with the resolved scope, active stage, pending gate, execution mode, and next safe action.
Treat missing execution evidence, missing validation evidence, explicit test-scope confirmation, unclear repo test conventions, any choice to widen from targeted tests to a broader suite run, and verification write or validation outcomes as explicit pending gates rather than post-hoc notes. Keep the contract evidence-backed: the `Execute` stage is bounded repo test generation grounded in saved summaries plus saved verification or UAT artifacts, and repo mutation stays limited to the selected tests plus minimal supporting helpers.
For non-trivial add-tests runs, use Gemini CLI's internal `update_topic` tool to keep the active stage visible and `write_todos` to keep a compact checklist for evidence review, scope confirmation, bounded test implementation, verification-note persistence, post-write validation, and routing. Treat both as session-local coordination only; when the host lacks them, preserve the same progress in prose rather than inventing persistence outside MCP.
Interactive add-tests UX rules:
- Prefer Gemini CLI's built-in `ask_user` tool over plain assistant prose whenever you need a structured decision about broad versus focused test scope, a wider suite run, or another bounded confirmation gate.
- Default to one focused question per `ask_user` call.
- For structured decisions, use `ask_user` with `type: "choice"`, 2-4 labeled options, concise descriptions, and a placeholder such as `Type your own answer...` so the built-in custom-answer path stays open.

Follow this flow exactly:

1. Resolve the target phase with `mcp_blueprint_blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. If the phase cannot be resolved, stop with the precise `mcp_blueprint_blueprint_phase_locate.reason` plus any recovery guidance.
3. Read `mcp_blueprint_blueprint_phase_summary_index`, `mcp_blueprint_blueprint_phase_validation_read` with `artifact: "verification"`, `mcp_blueprint_blueprint_phase_validation_read` with `artifact: "uat"`, `mcp_blueprint_blueprint_artifact_contract_read` with `artifactId: "phase.verification"`, `mcp_blueprint_blueprint_artifact_list`, `mcp_blueprint_blueprint_artifact_validate`, and `mcp_blueprint_blueprint_state_load` so you know the saved execution evidence, current validation or UAT context, the canonical verification contract, existing Blueprint artifacts, repo artifact health, and the current safe follow-up state.
4. If the target phase has no execution summaries, stop and route to `/blu-execute-phase <phase>` first. If the phase lacks both `XX-VERIFICATION.md` and `XX-UAT.md`, stop and route to `/blu-validate-phase <phase>` instead of generating tests from chat memory alone.
5. Read every available execution summary through `mcp_blueprint_blueprint_phase_summary_read` so test generation stays grounded in the saved implementation evidence instead of unstaged repo drift or prompt memory.
6. Resolve the repo test scope explicitly before editing:
   - if the user named files, directories, or a specific test runner, honor that scope first
   - otherwise derive a narrow default scope from the completed summaries, the existing verification or UAT gaps, and the current repo test conventions
   - prefer updating existing nearby tests over creating duplicate coverage in a second suite
7. Inspect the relevant repo code, existing tests, and test-runner configuration directly before writing. If the repo has no discoverable test convention, stop and explain the missing convention instead of inventing a new framework.
8. Keep repo mutation limited to the selected test files plus any minimal helper code that the new tests require. Do not widen into feature rewrites, unrelated refactors, or non-test documentation updates from this command.
9. Use the `blueprint-executor` subagent for bounded implementation when the requested test pass spans multiple files, multiple suites, or the relevant test harness needs careful adaptation. Use the `blueprint-verifier` subagent to review whether the proposed tests actually cover the saved execution behavior and any explicit verification or UAT gaps.
10. Report in-flight progress while add-tests is running. Keep the active stage visible as the run moves through `Resolve`, `Read`, `Decide`, `Execute`, `Persist`, `Validate`, and `Route`. At minimum surface the resolved phase, which summaries and saved validation artifacts grounded the pass, the selected test scope, whether tests are being added or updated, the current verification status, the pending gate, and the next safe implemented action.
11. Read `mcp_blueprint_blueprint_artifact_contract_read` with `artifactId: "phase.verification"` and normalize the final verification draft to the returned `authoringTemplate`.
12. Self-check the normalized verification draft against the returned contract before writing, then run the narrowest relevant test command you can infer safely from the repo. Prefer the targeted test files or package script over a broad full-suite run unless the user explicitly asked for that breadth.
13. Persist the updated verification notes through `mcp_blueprint_blueprint_phase_validation_write` with the resolved numeric `phase`, `artifact: "verification"`, and the full final markdown body. Reuse any existing `XX-VERIFICATION.md` as the baseline and extend it with explicit test-coverage notes instead of replacing it casually. Treat the returned `path` plus `summaryPaths` as authoritative, and keep the user-facing verification status aligned with the tool-owned `written` and `status` result instead of assuming persistence from a completed call.
14. Persist the durable outcome report through `mcp_blueprint_blueprint_artifact_report_write` with the bare report name `add-tests-<phase>`, not a `.blueprint/reports/...` path. The report should capture the selected scope, tests added or updated, test commands run, pass or fail status, the verification status, remaining gaps, and any follow-up guidance. Use the returned `path` as the authoritative saved report location.
15. Call `mcp_blueprint_blueprint_artifact_validate` after the write path and then `mcp_blueprint_blueprint_state_update` with `base: "synced"` so `STATE.md` reflects the active phase, the add-tests command, and the next safe implemented action derived from the updated artifact inventory.
16. Return a concise completion summary covering the target phase, the test scope, which summaries and validation artifacts informed the pass, whether tests were added or updated, the executed test command and result, the verification and report status, any remaining gaps, and the next safe implemented action.

Next-action rules:
- If the phase does not yet have `XX-REVIEW.md`, prefer `/blu-code-review <phase>`.
- Otherwise if test execution still failed or meaningful gaps remain, prefer `/blu-progress`.
- Otherwise prefer `/blu-progress`.

Response requirements:
- Use only `mcp_blueprint_blueprint_phase_locate`, `mcp_blueprint_blueprint_phase_summary_index`, `mcp_blueprint_blueprint_phase_summary_read`, `mcp_blueprint_blueprint_phase_validation_read`, `mcp_blueprint_blueprint_phase_validation_write`, `mcp_blueprint_blueprint_artifact_contract_read`, `mcp_blueprint_blueprint_artifact_list`, `mcp_blueprint_blueprint_artifact_validate`, `mcp_blueprint_blueprint_artifact_report_write`, `mcp_blueprint_blueprint_state_load`, and `mcp_blueprint_blueprint_state_update` for Blueprint-owned persistent state work.
- Keep Blueprint-owned writes inside the selected `.blueprint/phases/<phase>/` directory, `.blueprint/reports/`, and `.blueprint/STATE.md`.
- Keep repo code mutation limited to the selected test scope and any minimal supporting test helpers.
- Use `ask_user` for structured scope or breadth confirmations instead of burying them in prose.
- Do not hand-build validation filenames, summary links, or report paths; use the MCP return values as authoritative.
- Do not invent missing implementation details, missing acceptance criteria, or missing test frameworks from chat memory alone.
- Do not present planned-only commands as runnable follow-ups; route to `/blu-progress` instead when a narrower implemented command is not clearly better.
"""
