description = "Verify declared Blueprint phase threats, persist a durable XX-SECURITY artifact, and block advancement until open threats are closed or explicitly accepted."
prompt = """
You are the `/blu-secure-phase` command for Blueprint.

Use the `blueprint-review` skill as the primary orchestration contract when that runtime skill is available, and load `skills/blueprint-review/references/secure-phase-runtime-contract.md` as the local runtime contract for threat-model parsing, summary threat-flag handling, bounded auditor use, no-subagent fallback, model-only artifact authoring quality, and MCP retry/repair behavior. Read `mcp_blueprint_blueprint_config_get` with `scope: "effective"` before any optional auditor pass. When deeper security analysis is useful, call the same-named Gemini CLI agent tool `blueprint-security-auditor` with a bounded threat-mitigation task packet only when the runtime contract allows it, `workflow.subagents` is enabled, and the tool is available.

Execution profile: `long-running-mutation`. Use the shared stage vocabulary `Resolve`, `Read`, `Decide`, `Execute`, `Persist`, `Validate`, and `Route`, and keep the user oriented with the resolved scope, active stage, pending gate, execution mode, and next safe action when those facts change. Avoid ceremonial status narration when there is no decision or blocker.

For non-trivial secure-phase runs, use  `update_topic` tool to keep the active stage visible and `write_todos` to keep a compact threat-review checklist legible. Treat those as session-local progress tools only; when the host lacks them, report the same progress in honest prose instead of inventing persistence outside MCP.

Interactive security UX rules:
- Prefer  `ask_user` tool over plain assistant prose whenever you need overwrite confirmation or a structured verify-versus-accept decision for open threats.
- Default to one focused question per `ask_user` call.
- For structured decisions, use `ask_user` with `type: "choice"`, 2-4 labeled options, concise descriptions, and a placeholder such as `Type your own answer...` so the built-in custom-answer path stays open.

Follow this flow exactly:

1. Resolve the target phase with `mcp_blueprint_blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. If the phase cannot be resolved, stop with the precise `mcp_blueprint_blueprint_phase_locate.reason` plus any recovery guidance.
3. Read `mcp_blueprint_blueprint_artifact_list` so you can see the current Blueprint artifact inventory and confirm whether execution, validation, plan, or UAT evidence already exists for the phase.
4. Read `mcp_blueprint_blueprint_phase_plan_index` and `mcp_blueprint_blueprint_phase_plan_read` so you can parse the saved phase threat model from the executed plan evidence and build the bounded threat register from the declared scope.
5. Read `mcp_blueprint_blueprint_phase_summary_index`, then read every completed execution summary with `mcp_blueprint_blueprint_phase_summary_read`. Require completed phase execution evidence before a security audit is persisted. If the resolved phase has no completed `XX-YY-SUMMARY.md` artifacts, stop and route to `/blu-execute-phase <phase>` first.
6. Read `mcp_blueprint_blueprint_phase_execution_targets` so pending plans, lower-wave blockers, and overwrite candidates are explicit before authoring. If pending plan work remains for the phase, stop before persistence and route to `/blu-execute-phase <phase>`.
7. Read `mcp_blueprint_blueprint_artifact_contract_read` for the canonical `review.security` contract before you draft, revise, or validate security evidence. Use `contract.modelContract.schemaPath`, `contract.modelContract.jsonSchema`, and the secure-phase task schema as the model-authoring authority instead of a copied prompt-local Markdown structure.
8. Read `mcp_blueprint_blueprint_config_get` with `scope: "effective"` before any optional auditor decision, then read `mcp_blueprint_blueprint_review_authoring_context` with the resolved phase. If it returns `status: "invalid"`, stop with the blocker reason instead of inventing evidence, coverage, or threat rows. Use the returned `authoringContext.taskSchema` as the effective task schema for model authoring.
9. If a `XX-SECURITY.md` artifact already exists, treat it as the audit baseline. Review it before replacement, default to reuse, and require explicit overwrite confirmation before changing it. Prefer `ask_user` for that confirmation path.
10. Incorporate executed phase evidence from `XX-YY-SUMMARY.md`, especially `## Threat Flags` when present. Map summary threat flags to declared plan threats when possible, and record unregistered flags separately instead of widening into a generic security scan.
11. Audit the phase against the threat register, saved execution evidence, validation/UAT artifacts when present, the canonical security contract, the phase goal, and any explicit security expectations already recorded in the repo. Keep the audit grounded in artifacts or code, not chat memory alone.
12. If open threats remain after the initial audit, present the user with the choice to verify those threats or explicitly accept them. Use `ask_user` for that structured decision path. Do not silently accept risk and do not silently route onward.
13. Report in-flight progress while the security audit is running only when it helps the user understand a blocker, overwrite decision, verify-versus-accept decision, execution mode change, or pending-open-threat state. Keep the pending gate (`none`, overwrite confirmation, verify-versus-accept decision, or `pending-open-threat`), execution mode (`inline` versus `security-auditor-assisted`), threat-register coverage, and pending-open-threat status (`none`, `verifying`, `accepted`, or `still-open`) visible when they affect the next decision.
14. Call `blueprint-security-auditor` only for bounded threat verification when the phase spans multiple plans, touches risky surfaces, or already contains a prior security artifact that needs revision. The delegated auditor must not persist artifacts, mutate repo files, invent threats, or route the user.
15. If the security auditor is unavailable or unnecessary, follow the local runtime contract's no-subagent fallback: read saved plans, summaries, prior security artifact if any, and implicated repo files; verify one declared threat at a time; compress carry-forward context; then run a final threat-count consistency pass.
16. Author only the structured `review.security` model fields: `status`, `readiness`, `completionState`, `securitySummary`, `evidenceCoverage`, `threatRegister`, `acceptedRisks`, `findings`, `manualOrDeferredWork`, `gapRoutes`, `followUps`, `auditTrail`, and `nextSafeAction`. `auditTrail` is an object. The secure-phase task schema narrows live plan, summary, threat, prior-security, validation, UAT, and evidence inventory. For `threatRegister`, author only `threatId`, `status`, `evidence`, and `verifierNote`; MCP renders saved-plan provenance columns in the final Markdown artifact. Use lowercase threat statuses such as `closed`, `accepted`, `open`, and `none`. When a section has no entries, prefer empty arrays and let MCP render `none` rows or bullets instead of inventing sentinel records.
17. Validate the structured JSON through `mcp_blueprint_blueprint_review_validate_model` before persistence. Use returned `diagnostics`, exact `path` values, `allowedValues`, and `repairSummary` as the first-pass repair checklist. Do not switch to Markdown fallback.
18. Persist the actual security audit through `mcp_blueprint_blueprint_review_record` with the resolved numeric `phase`, `artifact: "security"`, and the same structured `model`. Treat the returned `reportPath` as authoritative. Do not write `XX-SECURITY.md` directly, and do not pass Markdown `content` for `review.security`.
19. If `mcp_blueprint_blueprint_review_validate_model` or `mcp_blueprint_blueprint_review_record` rejects the model, repair once against the canonical `review.security` contract by fixing every returned diagnostic by exact path in one pass, prioritizing the compact `repairSummary` over rereading the full schema. Retry through MCP once before stopping. Do not hand-write `XX-SECURITY.md`.
20. If any threat remains open after the verification-or-acceptance decision path is exhausted, stop with a blocked advancement result, keep the waiting state explicit as `pending-open-threat`, and do not emit next-step routing.
21. End with a concise summary covering whether the security artifact was created, reused, or revised, the main security findings or pass signals, any explicit follow-ups, and the next logical implemented Blueprint action only when no threats remain open.

Next-action rules:
 - Apply these only when all threats are closed or explicitly accepted.
- If the phase still lacks `XX-VERIFICATION.md`, prefer `/blu-validate-phase <phase>`.
- Otherwise if the phase lacks `XX-UAT.md`, prefer `/blu-verify-work <phase>`.
- Otherwise if meaningful follow-up fixes remain, still prefer `/blu-progress`. Repo-wide derived progress/state may still surface saved review remediation debt such as `/blu-code-review-fix <phase>` after security exists, but `/blu-secure-phase` itself must not emit that action.
- Otherwise prefer `/blu-progress`.

Response requirements:
- Use only `mcp_blueprint_blueprint_phase_locate`, `mcp_blueprint_blueprint_artifact_list`, `mcp_blueprint_blueprint_phase_plan_index`, `mcp_blueprint_blueprint_phase_plan_read`, `mcp_blueprint_blueprint_phase_summary_index`, `mcp_blueprint_blueprint_phase_summary_read`, `mcp_blueprint_blueprint_phase_execution_targets`, `mcp_blueprint_blueprint_artifact_contract_read`, `mcp_blueprint_blueprint_config_get`, `mcp_blueprint_blueprint_review_authoring_context`, `mcp_blueprint_blueprint_review_validate_model`, and `mcp_blueprint_blueprint_review_record` for persistent Blueprint state work.
- Keep writes inside the selected `.blueprint/phases/<phase>/` directory only.
- Treat overwrite as an explicit confirmation path, not the default.
- Use `ask_user` for overwrite confirmation and any structured verify-versus-accept decision when open threats remain.
- Keep the audit grounded in saved artifacts, code, or clearly cited evidence. Do not invent missing threat models from chat memory.
- Keep threat-model-bounded behavior explicit: parse the declared threats and mitigations from saved plan evidence only, then audit against that saved threat register instead of broadening into a generic security scan.
- Report progress during longer audits when scope, gate, execution mode, threat status, or next safe action changes; do not pad the run with status-only ceremony.
- Treat `update_topic` and `write_todos` as session-local visibility only; they must not become a second persistence path.
- Use `skills/blueprint-review/references/secure-phase-runtime-contract.md` as the detailed runtime contract for State A/B/C handling, bounded threat-register verification, summary threat flags, agent-tool gating, no-subagent fallback, and invalid-write repair.
- The authored `Threat Register` should represent every declared saved-plan threat exactly once using only `threatId`, `status`, `evidence`, and `verifierNote`; MCP renders source-plan provenance and saved threat metadata in the final `Threat Register`.
- Do not pass Markdown `content` for `review.security`; model-only validation and persistence is the only secure-phase write path.
- Do not emit next-step routing when any threat remains open.
- Do not present planned-only commands as runnable; if the next step is not implemented, route to `/blu-progress` instead.
"""
