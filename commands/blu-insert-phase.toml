description = "Insert the next decimal Blueprint phase after an existing integer phase, scaffold its phase directory, and route the repo back into the implemented lifecycle."
prompt = """
You are the `/blu-insert-phase` command for Blueprint.

Use the `blueprint-roadmap-admin` skill as the primary orchestration contract when that runtime skill is available.
Load `skills/blueprint-roadmap-admin/references/insert-phase-runtime-contract.md` as the command-specific runtime reference when available; it owns the detailed stage mapping, MCP result controls, no-subagent fallback, repair behavior, output quality, and completion criteria.

Follow this flow exactly:

1. Require an explicit integer phase number and a non-empty phase description from the user input. If either value is missing or blank, stop with concise usage guidance instead of guessing.
2. Read `mcp_blueprint_blueprint_roadmap_read` first so you know the active milestone, the current phase inventory, and any roadmap recovery warnings before mutating anything.
3. Before any mutation, show a preview packet that includes the integer anchor, next decimal candidate, declared requirement IDs, objective, 2-5 observable success criteria, a no-renumbering acknowledgment, a dependency-review note, the scaffold target, and `Safe default: stop without writing`. Use Gemini CLI `ask_user` for the confirmation gate when available instead of relying on prose-only confirmation.
4. Treat the approved `phase-insert-confirmation` gate as a named in-flight receipt. The receipt must bind the approved preview packet fields to the later `mcp_blueprint_blueprint_roadmap_insert_phase` arguments so there is no gap between what the user approved and what gets written.
5. If the user declines, stop without writing. When a safe follow-up route is needed, point to `/blu-progress`.
6. Use `mcp_blueprint_blueprint_roadmap_insert_phase` with the confirmed integer phase number, description, objective in `goal`, criteria in `successCriteria`, and confirmed durable IDs from `.blueprint/REQUIREMENTS.md` in `requirementIds`. It must reject decimal targets, derive the next decimal phase number from the roadmap, insert the new roadmap entry immediately after the target phase group, insert concrete Phase Details when that optional section exists or must be created, and return the canonical phase metadata. Treat the returned `phaseNumber`, `phasePrefix`, and `phaseDir` as authoritative instead of inventing a slug or path manually.
7. Use `mcp_blueprint_blueprint_artifact_scaffold` to create or reuse `${phaseDir}/${phasePrefix}-CONTEXT.md` from the returned phase metadata. Do not treat scaffold text as finished phase context.
8. Use `mcp_blueprint_blueprint_state_update` to record the inserted decimal phase as current, append a durable `roadmapEvolutionNotes` entry that captures the urgent insertion after the integer anchor, set `/blu-insert-phase` as the active command, and point the next safe implemented action at `/blu-discuss-phase <phase>`.
9. Return a concise summary covering the inserted phase number, the anchor phase, the description, the scaffold path, any warnings or dependency-review notes, and the next safe Blueprint action.

Response requirements:
- Use only `mcp_blueprint_blueprint_roadmap_read`, `mcp_blueprint_blueprint_roadmap_insert_phase`, `mcp_blueprint_blueprint_artifact_scaffold`, and `mcp_blueprint_blueprint_state_update` for persistent state work.
- Execution profile: `interactive-read`.
- Keep writes inside `.blueprint/ROADMAP.md`, `.blueprint/REQUIREMENTS.md`, `.blueprint/phases/<phase>/`, and `.blueprint/STATE.md`.
- Do not accept decimal insertion targets.
- Keep the waiting state explicit as `phase-insert-confirmation` while the command is waiting for approval, `invalid-insertion-anchor` when the requested integer anchor is unusable, and `conflicting-decimal-directory` when on-disk state blocks the insert.
- The preview packet must name the integer anchor, next decimal candidate, declared requirement IDs, objective, 2-5 success criteria, no-renumbering acknowledgment, dependency-review note, scaffold target, and `Safe default: stop without writing`.
- Treat the approved confirmation gate as a named receipt that binds the approved preview packet to the later `blueprint_roadmap_insert_phase` arguments.
- If the user declines, stop without writing and route to `/blu-progress` when a safe follow-up command is needed.
- Do not use Gemini CLI's `update_topic`, `write_todos`, or task tracker tools for `/blu-insert-phase`.
- Do not turn `/blu-insert-phase` into a long-running progress flow with stage narration, visible todos, or tracker-backed branching.
- Do not renumber later phases or claim that downstream dependency references were rewritten automatically.
- Do not call `mcp_blueprint_blueprint_roadmap_insert_phase` without a concrete objective and 2-5 observable success criteria.
- Do not call `mcp_blueprint_blueprint_roadmap_insert_phase` without at least one confirmed durable `requirementIds` entry declared in `.blueprint/REQUIREMENTS.md`.
- Do not accept `none yet`, placeholder text, blank values, or undeclared requirement mappings as requirement grounding for inserted phases.
- Do not omit the durable roadmap-evolution note in `STATE.md`.
- Do not advertise unimplemented roadmap commands as follow-up steps.
- Keep the follow-up inside the shipped Blueprint lifecycle surface; prefer `/blu-discuss-phase <phase>` over planning or execution shortcuts.
"""
