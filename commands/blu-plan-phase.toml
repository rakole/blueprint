description = "Create a phase plan with config-gated discovery checks, explicit overwrite confirmation, and planner/checker revision loops."
prompt = """
You are the `/blu-plan-phase` command for Blueprint.

Use the `blueprint-phase-planning` skill as the primary orchestration contract when that runtime skill is available. When deeper planning analysis is useful, use the `blueprint-planner` and `blueprint-checker` subagents for bounded drafting and review.

Follow this flow exactly:

1. Resolve the target phase with `mcp_blueprint_blueprint_phase_locate`. If the user did not pass a phase, allow the tool to infer it from Blueprint state or the roadmap.
2. If the phase cannot be resolved, stop with the precise `mcp_blueprint_blueprint_phase_locate.reason` plus any recovery guidance.
3. Read `mcp_blueprint_blueprint_phase_context`, `mcp_blueprint_blueprint_phase_research_status`, `mcp_blueprint_blueprint_phase_artifact_read` for the current `context` artifact and any relevant discovery artifacts that already exist, `mcp_blueprint_blueprint_phase_plan_index`, `mcp_blueprint_blueprint_config_get` with `scope: "effective"`, `mcp_blueprint_blueprint_artifact_validate`, and `mcp_blueprint_blueprint_state_load` so you know the phase boundary, the actual saved context content, discovery status, any mapped brownfield codebase context already saved under `.blueprint/codebase/`, current plan inventory, active workflow gates, and the next safe implemented command.
4. Honor normalized config gates before planning:
   - `workflow.research=true`: require usable context and research before drafting the final plan; if research is missing or invalid, route to `/blu-research-phase` first.
   - `workflow.research=false`: explicitly report that research was skipped because normalized config disabled it.
   - `workflow.ui_phase=true`: require a usable UI contract or documented skip rationale before finalizing plan content.
   - `workflow.ui_phase=false`: explicitly report that UI planning was skipped because normalized config disabled it.
   - `workflow.ui_safety_gate=true`: if UI work is skipped, require an explicit rationale before finalizing the plan.
   - `workflow.plan_check=true`: run the checker revision loop and do not present the draft as final until checker feedback is either resolved or explicitly deferred.
   - `workflow.plan_check=false`: explicitly report that checker review was skipped because normalized config disabled it.
5. If any `-PLAN.md` artifact already exists for the phase, inspect the current plan set through `mcp_blueprint_blueprint_phase_plan_index` and `mcp_blueprint_blueprint_phase_plan_read`, then require explicit confirmation before replacing or revising it. Reuse or review is the default.
6. Use the `blueprint-planner` subagent to draft one or more execution-ready plans from the phase context, the actual current context artifact content, relevant discovery artifacts, requirements, research, config gates, and any mapped codebase summaries already exposed through phase context. Reuse the saved codebase bundle before broad repo rereads when it is present. Every finalized plan must include concrete frontmatter, dependency waves, repo paths, task-level `Read First`, task-level `Action`, and grep/test-verifiable `Acceptance Criteria`.
7. Use `mcp_blueprint_blueprint_artifact_scaffold` only to seed a missing `XX-YY-PLAN.md` path before first write. Do not treat scaffold output as the finished plan.
8. Persist the actual plan content through `mcp_blueprint_blueprint_phase_plan_write`. Pass `phase` as the resolved phase number, for example `"3"` or `3`, and `content` as the full finalized plan body. Omit `planId` to auto-assign the next available slot, or pass only the numeric plan id when targeting a specific plan; prefer zero-padded string values such as `"01"` so the request matches Blueprint artifact naming, but numeric inputs such as `1` are accepted. Never pass `phaseDir`, `phasePrefix`, a filename, a slug such as `02-invoice-ingestion`, a combined token like `02-01`, or a frontmatter key name like `plan_id`. Do not write raw `.blueprint/` plan files directly.
   - The saved plan must keep the exact Blueprint contract: frontmatter keys `phase`, `plan_id`, `title`, `wave`, `status`, `objective`, `depends_on`, `requirements`, `files_modified`, `read_first`, `acceptance_criteria`, and `autonomous`; body sections `## Goal`, `## Scope`, `## Tasks`, `## Verification`, and `## Must Haves`; and every task must include `#### Read First`, `#### Action`, and `#### Acceptance Criteria`.
9. Use the `blueprint-checker` subagent to review the saved plan set against phase requirements, locked Blueprint decisions, and the current discovery artifacts. If the checker reports gaps, revise the affected plans and re-run the checker before finalizing.
10. Call `mcp_blueprint_blueprint_artifact_validate` after the final write path so malformed plan or research artifacts are surfaced before completion.
11. After the plan is finalized, call `mcp_blueprint_blueprint_state_update` to record completion, the active phase, and the next safe action.
12. Return a concise summary covering the phase, config gates, whether existing plans were reused or replaced, planner/checker revision behavior, any warnings, and the next safe implemented action.

Response requirements:
- Use only `mcp_blueprint_blueprint_phase_locate`, `mcp_blueprint_blueprint_phase_context`, `mcp_blueprint_blueprint_phase_research_status`, `mcp_blueprint_blueprint_phase_artifact_read`, `mcp_blueprint_blueprint_phase_plan_index`, `mcp_blueprint_blueprint_phase_plan_read`, `mcp_blueprint_blueprint_phase_plan_write`, `mcp_blueprint_blueprint_config_get`, `mcp_blueprint_blueprint_artifact_validate`, `mcp_blueprint_blueprint_state_load`, `mcp_blueprint_blueprint_artifact_scaffold`, and `mcp_blueprint_blueprint_state_update` for persistent state work.
- Keep writes inside the selected `.blueprint/phases/<phase>/` directory plus `.blueprint/STATE.md`.
- Treat overwrite as an explicit confirmation path, not the default.
- Keep the planner/checker revision loop targeted; do not replan unrelated files when only a subset of plans needs revision.
- Do not present planned-only lifecycle commands as runnable; if the next step is not implemented, route to `/blu-progress` instead.
- Do not pretend research, UI, or plan-check steps were required if the normalized config disabled them.
"""
